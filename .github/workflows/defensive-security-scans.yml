name: defensive-security-scans

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  source-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint placeholder
        run: echo "Replace with lint command"
      - name: Unit test placeholder
        run: echo "Replace with unit test command"
      - name: Artifact metadata validation placeholder
        run: echo "Replace with artifact/manifest validation"

  gitleaks:
    runs-on: ubuntu-latest
    needs: [source-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    runs-on: ubuntu-latest
    needs: [source-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  trivy-fs:
    runs-on: ubuntu-latest
    needs: [source-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  post-deploy-health-gate:
    runs-on: ubuntu-latest
    needs: [gitleaks, semgrep, trivy-fs]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Post-deploy smoke test placeholder
        run: echo "Replace with endpoint health / smoke test command"
      - name: Rollback decision placeholder
        run: echo "Replace with hold / rollback / fallback decision logic"
