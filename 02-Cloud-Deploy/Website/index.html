<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNS 解析監測</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; padding: 24px; background: #f6f7fb; color: #111; }
    h1 { margin: 0 0 16px; }
    .card { background: #fff; border-radius: 12px; padding: 16px 20px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); max-width: 900px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    label { font-weight: 600; }
    input, select { padding: 8px 10px; border-radius: 8px; border: 1px solid #d4d7dd; min-width: 180px; }
    button { padding: 10px 16px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { background: #9aa5b1; cursor: not-allowed; }
    .status { margin-top: 12px; font-size: 14px; }
    .log { margin-top: 16px; background: #0b1021; color: #e5e7eb; padding: 12px; border-radius: 10px; max-height: 320px; overflow: auto; font-family: SFMono-Regular, Consolas, monospace; font-size: 13px; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 12px; background: #e0e7ff; color: #1e3a8a; font-weight: 600; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>DNS 解析監測</h1>
    <div class="row">
      <label>
        網域：
        <input id="domain" type="text" value="" placeholder="example.com" />
      </label>
      <label>
        解析器：
        <select id="resolver">
          <option value="google">Google DoH (dns.google)</option>
          <option value="cloudflare">Cloudflare DoH (cloudflare-dns.com)</option>
          <option value="quad9">Quad9 DoH (dns.quad9.net)</option>
          <option value="custom">自訂 DoH (輸入端點)</option>
        </select>
      </label>
      <label id="customLabel" style="display:none;">
        自訂 DoH 端點：
        <input id="customEndpoint" type="text" placeholder="https://dns.example.com/dns-query" style="min-width:260px;" />
      </label>
      <label>
        週期 (秒)：
        <input id="interval" type="number" min="3" max="120" value="5" />
      </label>
      <div style="display:flex; gap:8px; align-items:flex-end;">
        <button id="startBtn">開始監測</button>
        <button id="stopBtn" disabled>停止</button>
        <button id="exportBtn" disabled>匯出紀錄</button>
      </div>
    </div>
    <div class="status">
      <span class="pill" id="state">待機</span>
      <span id="lastRun">尚未執行</span>
    </div>
    <div class="log" id="log"></div>
  </div>

  <script>
    const domainInput = document.getElementById("domain");
    const resolverSelect = document.getElementById("resolver");
    const intervalInput = document.getElementById("interval");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const exportBtn = document.getElementById("exportBtn");
    const logEl = document.getElementById("log");
    const stateEl = document.getElementById("state");
    const lastRunEl = document.getElementById("lastRun");
    const customLabel = document.getElementById("customLabel");
    const customEndpoint = document.getElementById("customEndpoint");

    let timer = null;
    let logBuffer = [];

    // Default domain: current host
    domainInput.value = window.location.hostname || "example.com";

    const resolvers = {
      google: (name) => `https://dns.google/resolve?name=${encodeURIComponent(name)}&type=A`,
      cloudflare: (name) => `https://cloudflare-dns.com/dns-query?name=${encodeURIComponent(name)}&type=A`,
      quad9: (name) => `https://dns.quad9.net/dns-query?name=${encodeURIComponent(name)}&type=A`,
      custom: (name) => {
        const base = customEndpoint.value.trim();
        if (!base) throw new Error("請輸入自訂 DoH 端點");
        const url = new URL(base);
        url.searchParams.set("name", name);
        url.searchParams.set("type", "A");
        return url.toString();
      },
    };

    async function queryDNS(name, providerKey) {
      const url = resolvers[providerKey](name);
      const started = Date.now();
      try {
        const res = await fetch(url, { headers: { accept: "application/dns-json" } });
        const latency = Date.now() - started;
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const answers = (data.Answer || []).filter(a => a.type === 1).map(a => a.data);
        return {
          ok: true,
          latency,
          provider: providerKey,
          resolverHost: new URL(url).host,
          status: data.Status,
          answers,
          raw: data,
        };
      } catch (err) {
        return { ok: false, error: err.message, provider: providerKey, latency: Date.now() - started };
      }
    }

    function appendLog(entry) {
      const ts = new Date().toLocaleTimeString();
      const lines = [];
      lines.push(`[${ts}] resolver=${entry.provider} (${entry.resolverHost || "-"})`);
      if (entry.ok) {
        lines.push(`  status=${entry.status} latency=${entry.latency}ms`);
        lines.push(`  A records=${entry.answers.join(", ") || "無"}`);
      } else {
        lines.push(`  error=${entry.error || "未知錯誤"} latency=${entry.latency}ms`);
      }
      const text = lines.join("\n");
      logBuffer.push(text);
      logEl.textContent = `${text}\n${logEl.textContent}`.slice(0, 8000);
      exportBtn.disabled = logBuffer.length === 0;
    }

    function setState(text, color) {
      stateEl.textContent = text;
      stateEl.style.background = color;
      stateEl.style.color = "#fff";
    }

    async function runOnce() {
      const name = domainInput.value.trim();
      const providerKey = resolverSelect.value;
      if (!name) {
        appendLog({ ok: false, provider: providerKey, error: "請輸入網域", latency: 0 });
        return;
      }
      setState("查詢中", "#f59e0b");
      const result = await queryDNS(name, providerKey);
      appendLog(result);
      setState(result.ok ? "正常" : "失敗", result.ok ? "#16a34a" : "#ef4444");
      lastRunEl.textContent = `最後執行：${new Date().toLocaleTimeString()}`;
    }

    function start() {
      const intervalMs = Math.max(3, Math.min(120, Number(intervalInput.value) || 5)) * 1000;
      intervalInput.value = intervalMs / 1000;
      startBtn.disabled = true;
      stopBtn.disabled = false;
      exportBtn.disabled = logBuffer.length === 0;
      runOnce();
      timer = setInterval(runOnce, intervalMs);
    }

    function stop() {
      if (timer) clearInterval(timer);
      timer = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      exportBtn.disabled = logBuffer.length === 0;
      setState("待機", "#cbd5e1");
    }

    function exportLogs() {
      if (!logBuffer.length) return;
      const blob = new Blob([logBuffer.join("\n")], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const ts = new Date().toISOString().replace(/[:.]/g, "-");
      a.download = `dns-monitor-${ts}.log`;
      a.click();
      URL.revokeObjectURL(url);
    }

    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", stop);
    exportBtn.addEventListener("click", exportLogs);
    resolverSelect.addEventListener("change", () => {
      const useCustom = resolverSelect.value === "custom";
      customLabel.style.display = useCustom ? "block" : "none";
    });
    window.addEventListener("beforeunload", stop);
  </script>
</body>
</html>
