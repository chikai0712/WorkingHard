# GlobalpingChecker V4 - Docker Compose
# 本地開發與部署配置

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: globalping_postgres
    environment:
      POSTGRES_USER: globalping
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-globalping_secure_password}
      POSTGRES_DB: globalping_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U globalping -d globalping_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # GlobalpingChecker Web Application
  web:
    build: .
    container_name: globalping_web
    environment:
      DATABASE_URL: postgresql://globalping:${POSTGRES_PASSWORD:-globalping_secure_password}@postgres:5432/globalping_db
      GLOBALPING_TOKEN: ${GLOBALPING_TOKEN}
      CHECK_INTERVAL_MINUTES: ${CHECK_INTERVAL_MINUTES:-90}
      DOMAINS_FILE: /app/${DOMAINS_FILE:-domains.txt}
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - ./domains.txt:/app/domains.txt:ro
      - ./test_10_domains.txt:/app/test_10_domains.txt:ro
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    ports:
      - "8888:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: globalping_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:

networks:
  default:
    name: globalping_network
