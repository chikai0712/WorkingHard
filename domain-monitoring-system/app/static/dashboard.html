<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Monitoring Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🛡️ Domain Monitoring System</h1>
                <div class="header-stats">
                    <div class="stat-badge">
                        <span class="stat-label">最後更新</span>
                        <span class="stat-value" id="lastUpdate">--</span>
                    </div>
                    <div class="stat-badge">
                        <span class="stat-label">自動刷新</span>
                        <span class="stat-value" id="autoRefresh">30s</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Summary Cards -->
        <section class="summary-section">
            <div class="summary-card total">
                <div class="card-icon">📊</div>
                <div class="card-content">
                    <h3>總域名數</h3>
                    <p class="card-value" id="totalDomains">--</p>
                    <span class="card-label">監控中</span>
                </div>
            </div>

            <div class="summary-card healthy">
                <div class="card-icon">✅</div>
                <div class="card-content">
                    <h3>正常</h3>
                    <p class="card-value" id="healthyDomains">--</p>
                    <span class="card-label">運行良好</span>
                </div>
            </div>

            <div class="summary-card warning">
                <div class="card-icon">⚠️</div>
                <div class="card-content">
                    <h3>警告</h3>
                    <p class="card-value" id="warningDomains">--</p>
                    <span class="card-label">需要關注</span>
                </div>
            </div>

            <div class="summary-card critical">
                <div class="card-icon">🚨</div>
                <div class="card-content">
                    <h3>嚴重</h3>
                    <p class="card-value" id="criticalAlerts">--</p>
                    <span class="card-label">立即處理</span>
                </div>
            </div>
        </section>

        <!-- Charts Section -->
        <section class="charts-section">
            <div class="chart-card">
                <h3>域名狀態分布</h3>
                <canvas id="statusChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>告警趨勢 (24小時)</h3>
                <canvas id="alertTrendChart"></canvas>
            </div>
        </section>

        <!-- Alerts Table -->
        <section class="alerts-section">
            <div class="section-header">
                <h2>🔔 最新告警</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="P0">P0</button>
                    <button class="filter-btn" data-filter="P1">P1</button>
                    <button class="filter-btn" data-filter="P2">P2</button>
                </div>
            </div>
            <div class="alerts-container" id="alertsContainer">
                <div class="loading">載入中...</div>
            </div>
        </section>

        <!-- Recent Events -->
        <section class="events-section">
            <h2>📝 最近監控事件</h2>
            <div class="events-container" id="eventsContainer">
                <div class="loading">載入中...</div>
            </div>
        </section>
    </div>

    <script src="/static/dashboard.js"></script>
</body>
</html>
