services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: mssql-learning
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Learn@MSSQL2024"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ../queries:/queries
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Learn@MSSQL2024' -Q 'SELECT 1' -No"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mssql_data:
    driver: local
