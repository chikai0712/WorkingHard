apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: db-monitoring
commonLabels:
  environment: dev
patches:
  - target:
      kind: Deployment
      name: mysqld-exporter
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
