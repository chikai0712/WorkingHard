<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIND DNS 管理界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .status.running {
            background: #10b981;
            color: white;
        }
        
        .status.stopped {
            background: #ef4444;
            color: white;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2626;
        }
        
        .btn-secondary {
            background: #6b7280;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #4b5563;
        }
        
        .zones-list {
            list-style: none;
        }
        
        .zone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9fafb;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .zone-info {
            flex: 1;
        }
        
        .zone-domain {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .zone-file {
            font-size: 12px;
            color: #6b7280;
        }
        
        .test-section {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .test-section input {
            flex: 1;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f0f9ff;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.error {
            background: #fef2f2;
            border-left-color: #ef4444;
        }
        
        .result.success {
            background: #f0fdf4;
            border-left-color: #10b981;
        }
        
        .result pre {
            margin: 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        
        .logs {
            max-height: 400px;
            overflow-y: auto;
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        
        .logs-line {
            margin-bottom: 5px;
            word-break: break-all;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 BIND DNS 管理界面</h1>
            <div>
                容器状态: <span id="containerStatus" class="status">检查中...</span>
            </div>
        </div>
        
        <div class="card">
            <h2>添加 DNS Zone</h2>
            <form id="addZoneForm">
                <div class="form-group">
                    <label for="domain">域名</label>
                    <input type="text" id="domain" placeholder="example.com" required>
                </div>
                <div class="form-group">
                    <label for="ip">IP 地址</label>
                    <input type="text" id="ip" placeholder="192.0.2.1" required pattern="^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$">
                </div>
                <button type="submit" class="btn btn-primary">添加 Zone</button>
            </form>
            <div id="addResult" class="result"></div>
        </div>
        
        <div class="card">
            <h2>现有 Zones</h2>
            <ul id="zonesList" class="zones-list">
                <li>加载中...</li>
            </ul>
        </div>
        
        <div class="card">
            <h2>测试 DNS 查询</h2>
            <div class="test-section">
                <input type="text" id="testDomain" placeholder="输入域名进行测试 (例如: example.com)">
                <button onclick="testDNS()" class="btn btn-secondary">查询</button>
            </div>
            <div id="testResult" class="result"></div>
        </div>
        
        <div class="card">
            <h2>DNS 查询日志</h2>
            <button onclick="loadLogs()" class="btn btn-secondary" style="margin-bottom: 15px;">刷新日志</button>
            <div id="logs" class="logs">点击"刷新日志"查看</div>
        </div>
    </div>
    
    <script>
        // 检查容器状态
        async function checkStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                const statusEl = document.getElementById('containerStatus');
                if (data.success) {
                    statusEl.textContent = data.status;
                    statusEl.className = 'status ' + (data.status.includes('Up') ? 'running' : 'stopped');
                }
            } catch (error) {
                console.error('检查状态失败:', error);
            }
        }
        
        // 加载 zones
        async function loadZones() {
            try {
                const response = await fetch('/api/zones');
                const data = await response.json();
                const listEl = document.getElementById('zonesList');
                
                if (data.success && data.zones.length > 0) {
                    listEl.innerHTML = data.zones.map(zone => `
                        <li class="zone-item">
                            <div class="zone-info">
                                <div class="zone-domain">${zone.domain}</div>
                                <div class="zone-file">文件: ${zone.file}</div>
                            </div>
                            <button onclick="deleteZone('${zone.domain}')" class="btn btn-danger">删除</button>
                        </li>
                    `).join('');
                } else {
                    listEl.innerHTML = '<li>暂无 zones</li>';
                }
            } catch (error) {
                console.error('加载 zones 失败:', error);
                document.getElementById('zonesList').innerHTML = '<li>加载失败</li>';
            }
        }
        
        // 添加 zone
        document.getElementById('addZoneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const domain = document.getElementById('domain').value;
            const ip = document.getElementById('ip').value;
            const resultEl = document.getElementById('addResult');
            
            resultEl.className = 'result';
            resultEl.innerHTML = '<div class="loading"></div> 添加中...';
            resultEl.classList.add('show');
            
            try {
                const response = await fetch('/api/zones', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain, ip })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultEl.className = 'result success show';
                    resultEl.innerHTML = `<pre>✅ ${data.message}</pre>`;
                    document.getElementById('addZoneForm').reset();
                    setTimeout(() => {
                        loadZones();
                        checkStatus();
                    }, 2000);
                } else {
                    resultEl.className = 'result error show';
                    resultEl.innerHTML = `<pre>❌ 错误: ${data.error}</pre>`;
                }
            } catch (error) {
                resultEl.className = 'result error show';
                resultEl.innerHTML = `<pre>❌ 错误: ${error.message}</pre>`;
            }
        });
        
        // 删除 zone
        async function deleteZone(domain) {
            if (!confirm(`确定要删除 zone "${domain}" 吗？`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/zones/${domain}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(data.message);
                    loadZones();
                } else {
                    alert('删除失败: ' + data.error);
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }
        
        // 测试 DNS
        async function testDNS() {
            const domain = document.getElementById('testDomain').value;
            if (!domain) {
                alert('请输入域名');
                return;
            }
            
            const resultEl = document.getElementById('testResult');
            resultEl.className = 'result';
            resultEl.innerHTML = '<div class="loading"></div> 查询中...';
            resultEl.classList.add('show');
            
            try {
                const response = await fetch('/api/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultEl.className = 'result success show';
                    resultEl.innerHTML = `<pre>查询结果:\n${data.result.length > 0 ? data.result.join('\n') : '无结果'}</pre>`;
                } else {
                    resultEl.className = 'result error show';
                    resultEl.innerHTML = `<pre>❌ 错误: ${data.error}</pre>`;
                }
            } catch (error) {
                resultEl.className = 'result error show';
                resultEl.innerHTML = `<pre>❌ 错误: ${error.message}</pre>`;
            }
        }
        
        // 加载日志
        async function loadLogs() {
            const logsEl = document.getElementById('logs');
            logsEl.textContent = '加载中...';
            
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                
                if (data.success) {
                    if (data.logs.length > 0) {
                        logsEl.innerHTML = data.logs.map(log => 
                            `<div class="logs-line">${log}</div>`
                        ).join('');
                    } else {
                        logsEl.textContent = '暂无日志';
                    }
                } else {
                    logsEl.textContent = '加载失败: ' + data.error;
                }
            } catch (error) {
                logsEl.textContent = '加载失败: ' + error.message;
            }
        }
        
        // 初始化
        checkStatus();
        loadZones();
        setInterval(checkStatus, 10000); // 每10秒检查一次状态
    </script>
</body>
</html>
