apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sysctl-configurator
  namespace: kube-system
  labels:
    app: sysctl-configurator
spec:
  selector:
    matchLabels:
      app: sysctl-configurator
  template:
    metadata:
      labels:
        app: sysctl-configurator
    spec:
      hostNetwork: true
      hostPID: true
      containers:
      - name: sysctl
        image: busybox:latest
        securityContext:
          privileged: true
        command:
        - /bin/sh
        - -c
        - |
          # Apply sysctl settings
          sysctl -w net.netfilter.nf_conntrack_max=9000000
          sysctl -w net.netfilter.nf_conntrack_udp_timeout=10
          sysctl -w net.netfilter.nf_conntrack_udp_timeout_stream=30
          sysctl -w net.core.rmem_max=134217728
          sysctl -w net.core.wmem_max=134217728
          sysctl -w net.core.rmem_default=8388608
          sysctl -w net.core.wmem_default=8388608
          
          # Keep container running
          while true; do sleep 3600; done
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            cpu: "100m"
            memory: "64Mi"
      tolerations:
      - effect: NoSchedule
        operator: Exists

