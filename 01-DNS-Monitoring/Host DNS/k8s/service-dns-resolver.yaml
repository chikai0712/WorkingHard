apiVersion: v1
kind: Service
metadata:
  name: dns-resolver
  namespace: dns
  labels:
    app: dns-resolver
    component: resolver
  annotations:
    # AWS NLB Configuration
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-proxy-protocol: "*"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "TCP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "53"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "5"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "3"
    # Cross-zone load balancing
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # Preserve client IP (works with proxy protocol)
    service.beta.kubernetes.io/aws-load-balancer-preserve-client-ip: "true"
spec:
  type: LoadBalancer
  ports:
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
  selector:
    app: dns-resolver
  sessionAffinity: None
  # Important: Do NOT use ExternalTrafficPolicy: Local
  # We rely on Proxy Protocol v2 instead for IP preservation
  # externalTrafficPolicy: Local  # Commented out - using Proxy Protocol instead

