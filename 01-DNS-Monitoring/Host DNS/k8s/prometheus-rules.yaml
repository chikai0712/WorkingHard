apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dns-resolver-alerts
  namespace: dns
  labels:
    app: dns-resolver
    component: monitoring
spec:
  groups:
  - name: dns-resolver.rules
    interval: 30s
    rules:
    # ============================================
    # Availability Alerts
    # ============================================
    - alert: DNSResolverDown
      expr: up{job="dns-resolver"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "DNS Resolver is down"
        description: "DNS Resolver pod {{ $labels.pod }} has been down for more than 1 minute"
    
    - alert: DNSResolverHighErrorRate
      expr: |
        rate(dnsdist_responses{rcode!="NOERROR"}[5m]) / 
        rate(dnsdist_responses[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High DNS error rate"
        description: "DNS error rate is {{ $value | humanizePercentage }} (threshold: 10%)"
    
    # ============================================
    # Performance Alerts
    # ============================================
    - alert: DNSResolverHighLatency
      expr: |
        histogram_quantile(0.95, 
          rate(dnsdist_responses_seconds_bucket[5m])
        ) > 0.1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High DNS response latency"
        description: "95th percentile latency is {{ $value }}s (threshold: 100ms)"
    
    - alert: DNSResolverHighQPS
      expr: rate(dnsdist_queries[5m]) > 50000
      for: 5m
      labels:
        severity: info
      annotations:
        summary: "High query rate"
        description: "Query rate is {{ $value | humanize }} QPS"
    
    # ============================================
    # Security Alerts
    # ============================================
    - alert: DNSResolverHighDynBlockCount
      expr: dnsdist_dynblock_numblo > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High number of blocked IPs"
        description: "{{ $value }} IPs are currently blocked (possible attack)"
    
    - alert: DNSResolverWaterTortureAttack
      expr: |
        rate(dnsdist_responses{rcode="SERVFAIL"}[1m]) > 1000
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Possible Water Torture attack detected"
        description: "SERVFAIL rate is {{ $value | humanize }} per second"
    
    # ============================================
    # Backend Health Alerts
    # ============================================
    - alert: DNSResolverBackendDown
      expr: dnsdist_pool_servers_down > 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "Unbound backend is down"
        description: "{{ $value }} Unbound backend(s) are down"
    
    - alert: DNSResolverAllBackendsDown
      expr: |
        dnsdist_pool_servers_up == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "All Unbound backends are down"
        description: "All recursive resolver backends are unavailable"
    
    # ============================================
    # Resource Alerts
    # ============================================
    - alert: DNSResolverHighMemoryUsage
      expr: |
        (container_memory_usage_bytes{pod=~"dns-resolver.*"} / 
         container_spec_memory_limit_bytes{pod=~"dns-resolver.*"}) > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage"
        description: "Memory usage is {{ $value | humanizePercentage }}"
    
    - alert: DNSResolverHighCPUUsage
      expr: |
        rate(container_cpu_usage_seconds_total{pod=~"dns-resolver.*"}[5m]) > 0.8
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage"
        description: "CPU usage is {{ $value | humanizePercentage }}"
    
    # ============================================
    # Cache Performance Alerts
    # ============================================
    - alert: DNSResolverLowCacheHitRate
      expr: |
        rate(unbound_struct_msg_cache_hits[5m]) / 
        (rate(unbound_struct_msg_cache_hits[5m]) + 
         rate(unbound_struct_msg_cache_misses[5m])) < 0.7
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Low cache hit rate"
        description: "Cache hit rate is {{ $value | humanizePercentage }} (threshold: 70%)"
    
    # ============================================
    # DNSTAP Logging Alerts
    # ============================================
    - alert: DNSTapSidecarDown
      expr: up{job="vector-dnstap"} == 0
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "DNSTAP sidecar is down"
        description: "DNSTAP logging sidecar is not running"

