apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-dnstap-config
  namespace: dns
  labels:
    app: dns-resolver
    component: observability
data:
  vector.yaml: |
    # ============================================
    # Vector Configuration for DNSTAP Collection
    # ============================================
    
    data_dir: /var/lib/vector
    
    # ============================================
    # Source: DNSTAP Unix Socket
    # ============================================
    sources:
      dnstap:
        type: dnstap
        max_frame_size: 10485760
        socket: /var/run/dnstap/dnstap.sock
        receive_buffer_bytes: 1048576
    
    # ============================================
    # Transform: IP Anonymization (Privacy)
    # ============================================
    transforms:
      anonymize_ip:
        type: remap
        inputs:
          - dnstap
        source: |
          # Anonymize IPv4 addresses (mask to /24)
          if exists(.client_ip) {
            if match(.client_ip, r'^\d+\.\d+\.\d+\.\d+$') {
              parts = split(.client_ip, ".")
              .client_ip = string!(parts[0]) + "." + string!(parts[1]) + "." + string!(parts[2]) + ".0"
            }
          }
          
          # Anonymize IPv6 addresses (mask to /48)
          if exists(.client_ip) {
            if match(.client_ip, r'^[0-9a-fA-F:]+$') {
              # Simple IPv6 masking - keep first 3 hextets
              parts = split(.client_ip, ":")
              if length(parts) >= 3 {
                .client_ip = parts[0] + ":" + parts[1] + ":" + parts[2] + "::"
              }
            }
          }
          
          # Add metadata
          .timestamp = now()
          .namespace = "dns"
          .cluster = "production"
    
    # ============================================
    # Sink: Multiple Outputs
    # ============================================
    sinks:
      # Option 1: ClickHouse (Recommended for high throughput)
      clickhouse:
        type: clickhouse
        inputs:
          - anonymize_ip
        endpoint: http://clickhouse.dns.svc.cluster.local:8123
        database: dns
        table: dnstap_logs
        compression: gzip
        batch:
          max_bytes: 10485760
          timeout_secs: 5
        encoding:
          codec: json
      
      # Option 2: Elasticsearch (Alternative)
      # elasticsearch:
      #   type: elasticsearch
      #   inputs:
      #     - anonymize_ip
      #   endpoint: http://elasticsearch.dns.svc.cluster.local:9200
      #   index: dnstap-%Y.%m.%d
      #   compression: gzip
      #   batch:
      #     max_bytes: 10485760
      #     timeout_secs: 5
      
      # Option 3: Kafka (For streaming)
      # kafka:
      #   type: kafka
      #   inputs:
      #     - anonymize_ip
      #   bootstrap_servers: kafka.dns.svc.cluster.local:9092
      #   topic: dnstap-logs
      #   encoding:
      #     codec: json
      #   compression: gzip
      
      # Option 4: Prometheus Metrics (Aggregated)
      prometheus_metrics:
        type: prometheus_exporter
        inputs:
          - anonymize_ip
        address: 0.0.0.0:9598
        default_namespace: vector_dnstap
        buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1.0, 2.5, 5.0, 10.0]

