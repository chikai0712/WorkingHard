apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dns-resolver
  namespace: dns
  labels:
    app: dns-resolver
    component: resolver
spec:
  selector:
    matchLabels:
      app: dns-resolver
  endpoints:
  # dnsdist Prometheus metrics
  - port: metrics
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    scheme: http
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
  # Unbound metrics (if exposed via sidecar)
  - port: unbound-control
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http
  # Vector DNSTAP metrics
  - port: 9598
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    scheme: http

