# ============================================
# Unbound Configuration for Recursive DNS Resolver
# Optimized for Kubernetes deployment with RFC 8767 support
# ============================================

server:
    # ============================================
    # 1. Network Interface & Port
    # ============================================
    # Listen on localhost (sidecar mode with dnsdist)
    interface: 127.0.0.1
    port: 5353
    
    # Enable Proxy Protocol v2 support
    # This allows receiving real client IP from dnsdist
    proxy-protocol-port: 5353
    
    # ============================================
    # 2. Concurrency & Performance
    # ============================================
    # Number of threads (should match CPU cores)
    num-threads: 4
    
    # Cache slabs (should be power of 2, close to num-threads)
    # Reduces lock contention in multi-threaded cache access
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4
    
    # Socket buffer sizes (critical for high QPS)
    # Prevents UDP packet loss due to kernel buffer overflow
    so-rcvbuf: 4m
    so-sndbuf: 4m
    
    # ============================================
    # 3. RFC 8767 - Serving Stale (Fast Recovery)
    # ============================================
    # Enable serving expired cache entries
    serve-expired: yes
    
    # Maximum TTL for stale data (1 day = 86400 seconds)
    # Prevents serving data older than 24 hours (security risk)
    serve-expired-ttl: 86400
    
    # Client timeout before falling back to stale data (1.8 seconds)
    # Ensures fresh data is preferred, stale only as fallback
    serve-expired-client-timeout: 1800
    
    # TTL for stale responses (30 seconds)
    # Forces clients to re-query soon, enabling quick recovery
    serve-expired-reply-ttl: 30
    
    # Only serve stale to clients (not for prefetch)
    serve-expired-client-only: yes
    
    # ============================================
    # 4. Cache Configuration
    # ============================================
    # Message cache size (adjust based on memory limits)
    msg-cache-size: 100m
    msg-cache-slabs: 4
    
    # RRset cache size
    rrset-cache-size: 200m
    rrset-cache-slabs: 4
    
    # Negative cache TTL (prevent NXDOMAIN abuse)
    cache-max-negative-ttl: 10
    
    # ============================================
    # 5. Prefetching (Cache Warming)
    # ============================================
    # Prefetch popular domains before TTL expires
    prefetch: yes
    
    # Prefetch DNSKEY for DNSSEC validation
    prefetch-key: yes
    
    # ============================================
    # 6. DNSSEC Validation
    # ============================================
    # Enable DNSSEC validation
    auto-trust-anchor-file: "/etc/unbound/root.key"
    
    # Hardening options
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    use-caps-for-id: yes
    
    # ============================================
    # 7. Privacy & Security
    # ============================================
    # Hide version information
    hide-version: yes
    hide-identity: yes
    
    # Rate limiting (internal protection)
    ratelimit: 1000
    ratelimit-factor: 0
    
    # ============================================
    # 8. DNSTAP Logging (Observability)
    # ============================================
    # Enable DNSTAP for structured binary logging
    dnstap:
        dnstap-enable: yes
        dnstap-socket-path: "/var/run/dnstap/dnstap.sock"
        dnstap-log-client-query-messages: yes
        dnstap-log-client-response-messages: yes
        dnstap-log-forwarder-query-messages: yes
        dnstap-log-forwarder-response-messages: yes
    
    # ============================================
    # 9. Forwarding & Upstream Configuration
    # ============================================
    # Use root hints for recursive resolution
    root-hints: "/etc/unbound/root.hints"
    
    # Optional: Forward specific domains to other resolvers
    # forward-zone:
    #     name: "example.com"
    #     forward-addr: 8.8.8.8@53
    #     forward-addr: 8.8.4.4@53
    
    # ============================================
    # 10. Access Control
    # ============================================
    # Allow queries from localhost (dnsdist)
    access-control: 127.0.0.1/32 allow
    access-control: ::1/128 allow
    
    # ============================================
    # 11. Performance Tuning
    # ============================================
    # EDNS buffer size
    edns-buffer-size: 1232
    
    # Maximum UDP response size
    max-udp-size: 1232
    
    # TCP upstream
    tcp-upstream: yes
    
    # ============================================
    # 12. Monitoring & Statistics
    # ============================================
    # Enable statistics collection
    statistics-interval: 0
    statistics-cumulative: no
    extended-statistics: yes
    
    # Control interface for remote management
    control-interface: 127.0.0.1
    control-port: 8953
    
    # ============================================
    # 13. Logging
    # ============================================
    # Log level (0=off, 1=minimal, 2=detailed, 3=more, 4=all)
    verbosity: 1
    
    # Log SERVFAIL for monitoring
    log-servfail: yes
    
    # ============================================
    # 14. Resource Limits
    # ============================================
    # Maximum number of queries per thread
    num-queries-per-thread: 4096
    
    # Outgoing port range
    outgoing-range: 4096
    
    # Number of outgoing TCP buffers
    outgoing-num-tcp: 10
    
    # Incoming TCP connections
    incoming-num-tcp: 10
    
    # ============================================
    # 15. Timeouts
    # ============================================
    # Query timeout
    timeout: 2
    
    # TCP timeout
    tcp-timeout: 2

# ============================================
# Python Scripting (Optional)
# ============================================
# python:
#     python-script: "/etc/unbound/unbound-script.py"

# ============================================
# Remote Control (Optional)
# ============================================
# remote-control:
#     control-enable: yes
#     control-interface: 127.0.0.1
#     control-port: 8953
#     server-key-file: "/etc/unbound/unbound_server.key"
#     server-cert-file: "/etc/unbound/unbound_server.pem"

# ============================================
# End of Configuration
# ============================================

