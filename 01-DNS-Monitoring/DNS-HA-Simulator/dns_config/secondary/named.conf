//
// BIND Configuration for Secondary DNS
// Simulating Google DNS with modifiable records
//

options {
    directory "/var/lib/bind";
    pid-file "/var/run/named/named.pid";
    
    // Listen on all interfaces
    listen-on port 53 { any; };
    listen-on-v6 port 53 { any; };
    
    // Allow queries from network
    allow-query { any; };
    allow-recursion { any; };
    allow-transfer { none; };
    
    // Forwarders (optional)
    // forwarders { 8.8.8.8; 8.8.4.4; };
    
    // DNSSEC
    dnssec-enable yes;
    dnssec-validation auto;
    
    // Logging
    logging {
        channel default_log {
            file "/var/log/named/named.log" versions 3 size 5m;
            severity dynamic;
            print-time yes;
        };
        category default { default_log; };
    };
};

// Zone for app.example.com
zone "app.example.com" {
    type master;
    file "/var/lib/bind/zones/app.example.com.zone";
    allow-update { none; };
    allow-transfer { none; };
};

// Root hints
zone "." {
    type hint;
    file "/etc/bind/db.root";
};

