//
// BIND 9 - 本機 DNS 專案
// 路徑以容器內為準：/etc/bind、/var/cache/bind、/var/log/bind
//

options {
    directory "/var/cache/bind";

    // 1. 監聽本機所有介面
    listen-on port 53 { any; };
    listen-on-v6 port 53 { any; };

    // 2. 允許遞迴查詢與任意網段查詢（本機 Docker 測試環境）
    recursion yes;
    allow-query { any; };
    allow-recursion { any; };

    // 3. ⚠️ 關鍵：關閉 DNSSEC 驗證，避免 Docker/測試環境下的 SERVFAIL
    dnssec-validation no;

    // 4. 在 Docker 環境下，改用外部遞迴 DNS 當 forwarders，避免 IPv6 route 問題
    forwarders {
        8.8.8.8;
        1.1.1.1;
    };

    // 其他雜項與統計、日誌路徑
    dump-file "/var/cache/bind/cache_dump.db";
    statistics-file "/var/cache/bind/named_stats.txt";
    memstatistics-file "/var/cache/bind/named_mem_stats.txt";
    version "Not Disclosed";
    hostname none;
    server-id none;
    auth-nxdomain no;
    zone-statistics yes;
};

logging {
    channel default_log {
        file "/var/log/bind/named.log" versions 3 size 5m;
        severity dynamic;
        print-time yes;
        print-severity yes;
    };
    channel query_log {
        file "/var/log/bind/query.log" versions 3 size 5m;
        severity dynamic;
        print-time yes;
    };
    category default { default_log; };
    category queries { query_log; };
};

zone "." IN {
    type hint;
    file "/etc/bind/db.root";
};

zone "localhost" {
    type master;
    file "/etc/bind/db.local";
};

zone "127.in-addr.arpa" {
    type master;
    file "/etc/bind/db.127";
};

zone "0.in-addr.arpa" {
    type master;
    file "/etc/bind/db.0";
};

zone "255.in-addr.arpa" {
    type master;
    file "/etc/bind/db.255";
};

zone "ip6.arpa" {
    type master;
    file "/etc/bind/db.ip6.arpa";
};

include "/etc/bind/named.conf.local";
