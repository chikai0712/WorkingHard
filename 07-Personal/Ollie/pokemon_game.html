<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>寶可夢對戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
            /* 防止雙擊縮放和意外縮放 */
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            transition: background 1s ease;
        }

        /* 場地背景樣式 */
        body.field-sunny {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #dc2626 100%);
        }

        body.field-rainy {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 50%, #1e3a8a 100%);
        }

        body.field-grassy {
            background: linear-gradient(135deg, #22c55e 0%, #15803d 50%, #14532d 100%);
        }

        body.field-rocky {
            background: linear-gradient(135deg, #78716c 0%, #57534e 50%, #292524 100%);
        }

        body.field-thunder {
            background: linear-gradient(135deg, #eab308 0%, #854d0e 50%, #422006 100%);
        }

        body.field-snowy {
            background: linear-gradient(135deg, #06b6d4 0%, #0e7490 50%, #164e63 100%);
        }

        body.field-dragon {
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 50%, #4c1d95 100%);
        }

        .game-container {
            width: 100%;
            max-width: 1200px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .title {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #ffd700;
        }

        .field-info {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            text-align: center;
            border: 3px solid #ffd700;
            animation: fieldPulse 2s ease-in-out infinite;
        }

        @keyframes fieldPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
        }

        .field-name {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .field-description {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .field-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .field-modal-content {
            text-align: center;
            padding: 50px;
            border-radius: 20px;
            max-width: 600px;
            animation: modalAppear 0.5s ease;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .field-emoji {
            font-size: 5em;
            margin-bottom: 20px;
            animation: emojiFloat 2s ease-in-out infinite;
        }

        @keyframes emojiFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .field-modal-title {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .field-modal-desc {
            font-size: 1.3em;
            margin-bottom: 30px;
        }

        .battle-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .team {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        .team-title {
            font-size: 1.5em;
            margin-bottom: 15px;
            text-align: center;
            color: #ffd700;
        }

        .active-pokemon {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 240, 240, 0.9) 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            border: 4px solid #d4af37;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: visible;
        }

        .active-pokemon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
            border-radius: 20px 20px 0 0;
        }

        .active-pokemon::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            bottom: 8px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            pointer-events: none;
        }

        .pokemon-image {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin: 10px auto;
            display: block;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.9) 0%, rgba(240, 240, 240, 0.7) 100%);
            border-radius: 15px;
            padding: 15px;
            border: 3px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            position: relative;
            z-index: 1;
        }

        .pokemon-name {
            font-size: 1.5em;
            margin: 15px 0;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8), 0 1px 0 rgba(212, 175, 55, 0.3);
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 237, 78, 0.1) 100%);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            position: relative;
            z-index: 1;
        }

        .status-icon {
            display: inline-block;
            font-size: 1.2em;
            animation: statusPulse 1.5s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .status-burn {
            color: #ff4444;
            text-shadow: 0 0 10px #ff0000;
        }

        .status-poison {
            color: #a855f7;
            text-shadow: 0 0 10px #9333ea;
        }

        .status-paralyze {
            color: #eab308;
            text-shadow: 0 0 10px #ca8a04;
        }

        .bar-container {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.4) 100%);
            border-radius: 12px;
            padding: 12px;
            margin: 12px 0;
            border: 2px solid rgba(212, 175, 55, 0.3);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
        }

        .bar-label {
            font-size: 1em;
            margin-bottom: 8px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        .bar {
            width: 100%;
            height: 28px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .bar-fill {
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.95em;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        .bar-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .hp-fill {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 50%, #16a34a 100%);
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.3), inset 0 -2px 5px rgba(0, 0, 0, 0.3);
        }

        .hp-fill.low {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
        }

        .hp-fill.critical {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #b91c1c 100%);
            animation: criticalPulse 1s ease-in-out infinite;
        }

        @keyframes criticalPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .energy-fill {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.3), inset 0 -2px 5px rgba(0, 0, 0, 0.3);
        }

        .pokemon-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .pokemon-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(240, 240, 240, 0.95) 100%);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid #d4af37;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            position: relative;
            overflow: hidden;
            /* 防止觸控縮放 */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .pokemon-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffd700, #ffed4e, #ffd700);
        }

        .pokemon-card::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            pointer-events: none;
        }

        .pokemon-card:hover:not(.dead):not(.active) {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border-color: #ffd700;
        }

        .pokemon-card.active {
            border-color: #4ade80;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.3) 0%, rgba(34, 197, 94, 0.3) 100%);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            animation: activeCardGlow 2s ease-in-out infinite;
        }

        @keyframes activeCardGlow {
            0%, 100% { box-shadow: 0 6px 20px rgba(74, 222, 128, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.8); }
            50% { box-shadow: 0 8px 30px rgba(74, 222, 128, 0.9), inset 0 1px 0 rgba(255, 255, 255, 1); }
        }

        .pokemon-card.dead {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
            background: linear-gradient(135deg, rgba(100, 100, 100, 0.5) 0%, rgba(80, 80, 80, 0.5) 100%);
            border-color: #666;
        }

        .pokemon-card-image-container {
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, rgba(240, 240, 240, 0.6) 100%);
            border-radius: 10px;
            padding: 8px;
            margin-bottom: 8px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            position: relative;
            z-index: 1;
        }

        .pokemon-card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .pokemon-card-name {
            font-size: 0.9em;
            margin-top: 5px;
            font-weight: bold;
            color: #2c3e50;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
            position: relative;
            z-index: 1;
        }

        .pokemon-card-hp {
            font-size: 0.8em;
            margin-top: 5px;
            padding: 3px 8px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border-radius: 10px;
            color: white;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .pokemon-card.dead .pokemon-card-hp {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .pokemon-card-type {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 1.2em;
            z-index: 2;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.3));
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            padding: 15px 20px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            /* 防止觸控縮放 */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            text-align: left;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .skill-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        .skill-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .skill-btn.type-火 {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .skill-btn.type-水 {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .skill-btn.type-草 {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }

        .skill-btn.type-電 {
            background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
        }

        .skill-btn.type-地面 {
            background: linear-gradient(135deg, #a16207 0%, #854d0e 100%);
        }

        .skill-btn.type-冰 {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
        }

        .skill-btn.type-龍 {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        }

        .skill-btn.type-飛行 {
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
        }

        .skill-btn.type-毒 {
            background: linear-gradient(135deg, #a855f7 0%, #9333ea 100%);
        }

        .skill-btn.type-格鬥 {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        }

        .skill-btn.type-幽靈 {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }

        .skill-btn.type-惡 {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
        }

        .skill-btn.type-一般 {
            background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%);
        }

        .skill-name {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .skill-info {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .skill-pp {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 0.8em;
        }

        .skill-pp.low {
            background: rgba(239, 68, 68, 0.5);
        }

        .log {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #ffd700;
            padding-left: 15px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .damage-animation {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* 攻擊動畫 */
        .attack-animation {
            animation: attackMove 0.6s ease;
        }

        @keyframes attackMove {
            0% { transform: translateX(0) scale(1); }
            30% { transform: translateX(30px) scale(1.1); }
            60% { transform: translateX(30px) scale(1.1); }
            100% { transform: translateX(0) scale(1); }
        }

        /* 攻擊發光效果 */
        .attack-glow {
            animation: attackGlow 0.6s ease;
        }

        @keyframes attackGlow {
            0%, 100% { 
                box-shadow: 0 0 0 rgba(255, 255, 255, 0);
                filter: brightness(1);
            }
            50% { 
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 165, 0, 0.6);
                filter: brightness(1.3);
            }
        }

        /* 大攻擊特效 */
        .big-attack-effect {
            position: relative;
            overflow: visible;
        }

        .big-attack-effect::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.6) 0%, transparent 70%);
            transform: translate(-50%, -50%) scale(0);
            animation: bigAttackExplosion 0.8s ease;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes bigAttackExplosion {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* 技能特效粒子 */
        .skill-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #ffd700, #ff8c00);
            border-radius: 50%;
            animation: particleFloat 1s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* 受擊閃爍 */
        .hit-flash {
            animation: hitFlash 0.3s ease;
        }

        @keyframes hitFlash {
            0%, 100% { opacity: 1; }
            25% { opacity: 0.3; }
            50% { opacity: 1; }
            75% { opacity: 0.3; }
        }

        /* 暴擊特效 */
        .critical-hit {
            animation: criticalHit 0.8s ease;
        }

        @keyframes criticalHit {
            0% { 
                transform: scale(1);
                filter: brightness(1) drop-shadow(0 0 0 transparent);
            }
            20% { 
                transform: scale(1.15);
                filter: brightness(1.5) drop-shadow(0 0 20px #ff0000);
            }
            40% { 
                transform: scale(1.1);
                filter: brightness(1.8) drop-shadow(0 0 30px #ff4444);
            }
            60% { 
                transform: scale(1.15);
                filter: brightness(1.5) drop-shadow(0 0 20px #ff0000);
            }
            100% { 
                transform: scale(1);
                filter: brightness(1) drop-shadow(0 0 0 transparent);
            }
        }

        /* 暴擊傷害數字 */
        .critical-damage-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 10px #ffff00, 0 0 20px #ff0000;
            animation: criticalDamageFloat 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes criticalDamageFloat {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%) scale(1);
            }
        }

        /* 攻擊道具動畫 */
        .attack-item {
            position: absolute;
            font-size: 2em;
            pointer-events: none;
            z-index: 50;
            animation: throwItem 0.6s ease-out forwards;
        }

        @keyframes throwItem {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(var(--throw-x), calc(var(--throw-y) - 50px)) rotate(360deg) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translate(var(--throw-x), var(--throw-y)) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over.show {
            display: flex;

    <script>
        // 防止雙擊縮放（iOS Safari）
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // 防止雙擊縮放（通用方法）
        let lastClickTime = 0;
        document.addEventListener('click', function(event) {
            const now = Date.now();
            if (now - lastClickTime < 300) {
                event.preventDefault();
                return false;
            }
            lastClickTime = now;
        }, true);

        // 禁用雙擊選擇文字
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        });

        // 音樂控制
        let musicPlaying = false;
        const bgm = document.getElementById('bgm');
        
        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            if (musicPlaying) {
                bgm.pause();
                btn.textContent = '🔇';
                musicPlaying = false;
            } else {
                bgm.play().catch(e => console.log('音樂播放需要用戶互動'));
                btn.textContent = '🔊';
                musicPlaying = true;
            }

        // 自動播放音樂（需要用戶互動）
        document.addEventListener('click', function playOnFirstClick() {
            if (!musicPlaying) {

        // 屬性相剋表
        const typeChart = {

                return 0.75;
            }
            return 1.0;

        function renderTeam(side, team) {
            const container = document.getElementById(`${side}-team`);
            container.innerHTML = '';
            const activeIndex = side === 'player' ? playerActive : enemyActive;
            
            // 屬性圖示對應
            const typeEmojis = {
                '火': '🔥',
                '水': '💧',

                '一般': '⭐'
            };
            
            team.forEach((pokemon, index) => {
                const card = document.createElement('div');
                card.className = `pokemon-card ${index === activeIndex ? 'active' : ''} ${!pokemon.alive ? 'dead' : ''}`;

                const typeEmoji = typeEmojis[pokemon.type] || '⭐';

            });
        }

        // 更新場上寶可夢
        function updateActivePokemon() {
            updatePokemonDisplay('player', playerTeam[playerActive]);
            updatePokemonDisplay('enemy', enemyTeam[enemyActive]);
            renderSkillButtons();
        }

        function updatePokemonDisplay(side, pokemon) {
            document.getElementById(`${side}-image`).src = pokemon.image;
            
            // 顯示名稱和狀態
            let nameHtml = `${pokemon.name} (${pokemon.type}系) 速度:${pokemon.speed}`;
            if (pokemon.status) {
                const statusInfo = statusEffects[pokemon.status];
                nameHtml += ` <span class="status-icon status-${pokemon.status}">${statusInfo.emoji}</span>`;
            }
            document.getElementById(`${side}-name`).innerHTML = nameHtml;
            
            updateHPBar(side, pokemon);
        }

        // 渲染技能按鈕
        function renderSkillButtons() {
            const container = document.getElementById('skill-controls');
            const pokemon = playerTeam[playerActive];
            
            container.innerHTML = '';
            
            pokemon.skills.forEach((skill, index) => {
                const btn = document.createElement('button');
                btn.className = `btn skill-btn type-${skill.type}`;
                btn.disabled = skill.pp <= 0;
                btn.onclick = () => useSkill(index);
                
                const ppClass = skill.pp <= skill.maxPp * 0.25 ? 'low' : '';
                
                let skillInfo = `威力 ${skill.power} | ${skill.type}系`;
                if (skill.status) {
                    const statusInfo = statusEffects[skill.status];
                    skillInfo += ` | ${statusInfo.emoji}${statusInfo.name}`;
                }
                
                btn.innerHTML = `
                    <div class="skill-pp ${ppClass}">PP ${skill.pp}/${skill.maxPp}</div>
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-info">${skillInfo}</div>
                `;
                
                container.appendChild(btn);
            });
        }

        function updateHPBar(side, pokemon) {
            const hpBar = document.getElementById(`${side}-hp`);
            const percentage = (pokemon.hp / pokemon.maxHp) * 100;
            hpBar.style.width = percentage + '%';
            hpBar.textContent = `${pokemon.hp}/${pokemon.maxHp}`;
            
            hpBar.className = 'bar-fill hp-fill';
            if (percentage <= 25) {
                hpBar.classList.add('critical');
            } else if (percentage <= 50) {
                hpBar.classList.add('low');
            }
        }

        // 使用技能
        function useSkill(skillIndex) {
            const attacker = playerTeam[playerActive];
            const defender = enemyTeam[enemyActive];
            const skill = attacker.skills[skillIndex];
            
            if (!attacker.alive) {
                addLog('你的寶可夢已陣亡，請切換寶可夢！');
                return;
            }
            
            if (skill.pp <= 0) {
                addLog(`${skill.name} 的 PP 已用完！`);
                return;
            }
            
            // 檢查麻痺狀態是否無法行動
            if (attacker.status === 'paralyze') {
                if (Math.random() < statusEffects.paralyze.skipChance) {
                    addLog(`${attacker.name} 因麻痺而無法行動！⚡`);
                    skill.pp--;
                    renderSkillButtons();
                    setTimeout(() => {
                        enemyTurn();
                    }, 1000);
                    return;
                }
            }
            
            // 扣除 PP
            skill.pp--;
            
            // 速度判定：決定誰先攻擊（考慮麻痺效果）
            let attackerSpeed = attacker.speed;
            let defenderSpeed = defender.speed;
            
            if (attacker.status === 'paralyze') {
                attackerSpeed *= statusEffects.paralyze.speedReduction;
            }
            if (defender.status === 'paralyze') {
                defenderSpeed *= statusEffects.paralyze.speedReduction;
            }
            
            if (attackerSpeed < defenderSpeed) {
                // 敵方速度更快，先攻擊
                addLog(`⚡ ${defender.name} 的速度更快！敵方先攻擊！`);
                setTimeout(() => {
                    enemyTurn(() => {
                        // 敵方攻擊後，檢查玩家是否還活著
                        if (playerTeam[playerActive].alive) {
                            setTimeout(() => {
                                playerAttackWithSkill(skillIndex, true); // 標記為反擊，不再觸發敵方回合
                            }, 1000);
                        }
                    });
                }, 500);
            } else {
                // 玩家速度更快或相等，先攻擊
                if (attackerSpeed > defenderSpeed) {
                    addLog(`⚡ ${attacker.name} 的速度更快！你先攻擊！`);
                }
                playerAttackWithSkill(skillIndex, false); // 正常攻擊，會觸發敵方回合
            }
        }

        // 玩家使用技能攻擊
        function playerAttackWithSkill(skillIndex, skipEnemyTurn = false) {
            const attacker = playerTeam[playerActive];
            const defender = enemyTeam[enemyActive];
            const skill = attacker.skills[skillIndex];
            
            addLog(`${attacker.name} 使用了 ${skill.name}！`);
            
            // 計算傷害
            const baseDamage = skill.power;
            const typeMultiplier = getTypeMultiplier(skill.type, defender.type);
            
            // 場地效果
            let fieldMultiplier = 1.0;
            if (currentField) {
                if (skill.type === currentField.boostType) {
                    fieldMultiplier = currentField.boostMultiplier;
                    addLog(`${currentField.emoji} ${currentField.name}強化了${skill.type}系技能！`);
                } else if (skill.type === currentField.weakenType) {
                    fieldMultiplier = currentField.weakenMultiplier;
                    addLog(`${currentField.emoji} ${currentField.name}削弱了${skill.type}系技能...`);
                }
            }
            
            // 暴擊判定（20% 機率）
            const isCritical = Math.random() < 0.20;
            const critMultiplier = isCritical ? 1.5 : 1;
            
            const finalDamage = Math.floor(baseDamage * typeMultiplier * fieldMultiplier * critMultiplier);
            
            if (isCritical) {
                addLog(`💥 會心一擊！造成 1.5 倍傷害！`);
            }
            
            if (typeMultiplier > 1) {
                addLog(`⚡ 效果絕佳！${skill.type}系剋${defender.type}系！`);
            } else if (typeMultiplier < 1) {
                addLog(`💨 效果不好...${skill.type}系被${defender.type}系抵抗`);
            }
            
            defender.hp = Math.max(0, defender.hp - finalDamage);
            addLog(`造成 ${finalDamage} 點傷害！`);
            
            // 狀態異常判定
            if (skill.status && skill.statusChance && !defender.status) {
                if (Math.random() < skill.statusChance) {
                    defender.status = skill.status;
                    const statusInfo = statusEffects[skill.status];
                    addLog(`${defender.name} 陷入了${statusInfo.name}狀態！${statusInfo.emoji}`);
                }
            }
            
            // 觸發攻擊動畫
            const attackerElement = document.getElementById('player-active');
            const defenderElement = document.getElementById('enemy-active');
            
            // 投擲攻擊道具
            throwAttackItem(attackerElement, defenderElement, skill.type);
            
            // 攻擊者動畫
            attackerElement.classList.add('attack-animation', 'attack-glow');
            if (skill.power >= 100) {
                attackerElement.classList.add('big-attack-effect');
                createSkillParticles(attackerElement);
            }
            
            // 受擊者動畫（延遲到道具飛到時才觸發）
            setTimeout(() => {
                defenderElement.classList.add('damage-animation', 'hit-flash');
                
                // 暴擊特效
                if (isCritical) {
                    defenderElement.classList.add('critical-hit');
                    showCriticalDamageText(defenderElement, finalDamage);
                }
            }, 300);
            
            // 移除動畫類
            setTimeout(() => {
                attackerElement.classList.remove('attack-animation', 'attack-glow', 'big-attack-effect');
                defenderElement.classList.remove('damage-animation', 'hit-flash', 'critical-hit');
            }, 800);
            
            updateHPBar('enemy', defender);
            renderSkillButtons();
            
            if (defender.hp <= 0) {
                defender.alive = false;
                addLog(`${defender.name} 陣亡了！`);
                
                const aliveEnemy = enemyTeam.findIndex(p => p.alive);
                if (aliveEnemy === -1) {
                    endGame('player');
                    return;
                } else {
                    enemyActive = aliveEnemy;
                    addLog(`敵方派出了 ${enemyTeam[enemyActive].name}！`);
                }
            }
            
            renderTeams();
            updateActivePokemon();
            
            // 應用狀態異常效果（回合結束）
            applyStatusEffects(defender);
            
            // 只有在不跳過敵方回合且敵方還活著時才反擊
            if (!skipEnemyTurn && enemyTeam[enemyActive].alive) {
                setTimeout(() => {
                    enemyTurn();
                }, 1000);
            }
        }

        // 應用狀態異常效果
        function applyStatusEffects(pokemon) {
            if (!pokemon.status || !pokemon.alive) return;
            
            const status = statusEffects[pokemon.status];
            
            if (status.damage) {
                const damage = Math.floor(pokemon.maxHp * status.damage);
                pokemon.hp = Math.max(0, pokemon.hp - damage);
                addLog(`${pokemon.name} 受到${status.name}傷害！${status.emoji} (-${damage} HP)`);
                
                // 更新 HP 顯示
                const side = playerTeam.includes(pokemon) ? 'player' : 'enemy';
                updateHPBar(side, pokemon);
                
                // 檢查是否陣亡
                if (pokemon.hp <= 0) {
                    pokemon.alive = false;
                    addLog(`${pokemon.name} 因${status.name}而陣亡了！`);
                    
                    if (side === 'player') {
                        const alivePlayer = playerTeam.findIndex(p => p.alive);
                        if (alivePlayer === -1) {
                            endGame('enemy');
                        } else {
                            addLog('請選擇下一隻寶可夢上場！');
                        }
                    } else {
                        const aliveEnemy = enemyTeam.findIndex(p => p.alive);
                        if (aliveEnemy === -1) {
                            endGame('player');
                        } else {
                            enemyActive = aliveEnemy;
                            addLog(`敵方派出了 ${enemyTeam[enemyActive].name}！`);
                        }
                    }
                    
                    renderTeams();
                    updateActivePokemon();
                }
            }
        }

        // 切換寶可夢
        function switchPokemon(side, index) {
            const team = side === 'player' ? playerTeam : enemyTeam;
            const currentIndex = side === 'player' ? playerActive : enemyActive;
            
            if (index === currentIndex || !team[index].alive) {
                return;
            }
            
            if (side === 'player') {
                playerActive = index;
                addLog(`你派出了 ${team[index].name}！`);
            } else {
                enemyActive = index;
                addLog(`敵方派出了 ${team[index].name}！`);
            }
            
            renderTeams();
            updateActivePokemon();
        }

        // 創建技能粒子特效
        function createSkillParticles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const angle = (Math.PI * 2 * i) / 12;
                const distance = 50 + Math.random() * 30;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.style.left = (rect.width / 2 - 4) + 'px';
                particle.style.top = (rect.height / 2 - 4) + 'px';
                
                element.style.position = 'relative';
                element.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // 顯示暴擊傷害數字
        function showCriticalDamageText(element, damage) {
            const damageText = document.createElement('div');
            damageText.className = 'critical-damage-text';
            damageText.textContent = `💥 ${damage}!`;
            
            element.style.position = 'relative';
            element.appendChild(damageText);
            
            setTimeout(() => {
                damageText.remove();
            }, 1000);
        }

        // 創建攻擊道具動畫
        function throwAttackItem(fromElement, toElement, skillType) {
            const fromRect = fromElement.getBoundingClientRect();
            const toRect = toElement.getBoundingClientRect();
            
            // 根據技能類型選擇道具圖示
            const itemIcons = {
                '火': '🔥',
                '水': '💧',
                '草': '🍃',
                '電': '⚡',
                '冰': '❄️',
                '地面': '🪨',
                '龍': '🐉',
                '飛行': '🌪️',
                '毒': '☠️',
                '格鬥': '👊',
                '幽靈': '👻',
                '惡': '🌑',
                '一般': '⭐'
            };
            
            const item = document.createElement('div');
            item.className = 'attack-item';
            item.textContent = itemIcons[skillType] || '⚡';
            
            // 計算投擲距離
            const throwX = toRect.left - fromRect.left;
            const throwY = toRect.top - fromRect.top;
            
            item.style.setProperty('--throw-x', throwX + 'px');
            item.style.setProperty('--throw-y', throwY + 'px');
            item.style.left = (fromRect.left + fromRect.width / 2) + 'px';
            item.style.top = (fromRect.top + fromRect.height / 2) + 'px';
            
            document.body.appendChild(item);
            
            setTimeout(() => {
                item.remove();
            }, 600);
        }

        // 敵方回合
        function enemyTurn(callback) {
            const attacker = enemyTeam[enemyActive];
            const defender = playerTeam[playerActive];
            
            if (!attacker.alive) return;
            
            // 檢查麻痺狀態是否無法行動
            if (attacker.status === 'paralyze') {
                if (Math.random() < statusEffects.paralyze.skipChance) {
                    addLog(`${attacker.name} 因麻痺而無法行動！⚡`);
                    if (callback) callback();
                    return;
                }
            }
            
            // 隨機選擇一個有 PP 的技能
            const availableSkills = attacker.skills.filter(s => s.pp > 0);
            if (availableSkills.length === 0) {
                addLog(`${attacker.name} 沒有可用的技能了！`);
                if (callback) callback();
                return;
            }
            
            const skill = availableSkills[Math.floor(Math.random() * availableSkills.length)];
            skill.pp--;
            
            addLog(`${attacker.name} 使用了 ${skill.name}！`);
            
            const baseDamage = skill.power;
            const typeMultiplier = getTypeMultiplier(skill.type, defender.type);
            
            // 場地效果
            let fieldMultiplier = 1.0;
            if (currentField) {
                if (skill.type === currentField.boostType) {
                    fieldMultiplier = currentField.boostMultiplier;
                    addLog(`${currentField.emoji} ${currentField.name}強化了${skill.type}系技能！`);
                } else if (skill.type === currentField.weakenType) {
                    fieldMultiplier = currentField.weakenMultiplier;
                    addLog(`${currentField.emoji} ${currentField.name}削弱了${skill.type}系技能...`);
                }
            }
            
            // 敵方暴擊判定（20% 機率）
            const isCritical = Math.random() < 0.20;
            const critMultiplier = isCritical ? 1.5 : 1;
            
            const finalDamage = Math.floor(baseDamage * typeMultiplier * fieldMultiplier * critMultiplier);
            
            if (isCritical) {
                addLog(`💥 敵方會心一擊！造成 1.5 倍傷害！`);
            }
            
            if (typeMultiplier > 1) {
                addLog(`⚡ 敵方效果絕佳！`);
            } else if (typeMultiplier < 1) {
                addLog(`💨 敵方效果不好...`);
            }
            
            defender.hp = Math.max(0, defender.hp - finalDamage);
            addLog(`造成 ${finalDamage} 點傷害！`);
            
            // 狀態異常判定
            if (skill.status && skill.statusChance && !defender.status) {
                if (Math.random() < skill.statusChance) {
                    defender.status = skill.status;
                    const statusInfo = statusEffects[skill.status];
                    addLog(`${defender.name} 陷入了${statusInfo.name}狀態！${statusInfo.emoji}`);
                }
            }
            
            // 敵方攻擊動畫
            const enemyAttackerElement = document.getElementById('enemy-active');
            const playerDefenderElement = document.getElementById('player-active');
            
            // 投擲攻擊道具
            throwAttackItem(enemyAttackerElement, playerDefenderElement, skill.type);
            
            // 敵方攻擊者動畫
            enemyAttackerElement.classList.add('attack-animation', 'attack-glow');
            if (skill.power >= 100) {
                enemyAttackerElement.classList.add('big-attack-effect');
                createSkillParticles(enemyAttackerElement);
            }
            
            // 玩家受擊動畫（延遲到道具飛到時才觸發）
            setTimeout(() => {
                playerDefenderElement.classList.add('damage-animation', 'hit-flash');
                
                // 暴擊特效
                if (isCritical) {
                    playerDefenderElement.classList.add('critical-hit');
                    showCriticalDamageText(playerDefenderElement, finalDamage);
                }
            }, 300);
            
            // 移除動畫類
            setTimeout(() => {
                enemyAttackerElement.classList.remove('attack-animation', 'attack-glow', 'big-attack-effect');
                playerDefenderElement.classList.remove('damage-animation', 'hit-flash', 'critical-hit');
            }, 800);
            
            updateHPBar('player', defender);
            
            if (defender.hp <= 0) {
                defender.alive = false;
                addLog(`${defender.name} 陣亡了！`);
                
                const alivePlayer = playerTeam.findIndex(p => p.alive);
                if (alivePlayer === -1) {
                    endGame('enemy');
                    return;
                } else {
                    addLog('請選擇下一隻寶可夢上場！');
                }
            }
            
            renderTeams();
            updateActivePokemon();
            
            // 應用狀態異常效果（回合結束）
            applyStatusEffects(defender);
            
            // 執行回調（用於速度系統）
            if (callback) {
                callback();
            }
        }

        // 遊戲結束
        function endGame(winner) {
            const gameOver = document.getElementById('game-over');
            const winnerText = document.getElementById('winner-text');
            
            if (winner === 'player') {
                winnerText.textContent = '🎉 你贏了！恭喜！';
            } else {
                winnerText.textContent = '😢 你輸了！再接再厲！';
            }
            
            gameOver.classList.add('show');
        }

        // 添加日誌
        function addLog(message) {
            const log = document.getElementById('battle-log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = message;
            log.insertBefore(entry, log.firstChild);
            
            while (log.children.length > 10) {
                log.removeChild(log.lastChild);
            }
        }

        // 啟動遊戲
        initGame();
    </script>
</body>
</html>
