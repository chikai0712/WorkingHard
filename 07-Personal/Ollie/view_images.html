<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查看所有圖片</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #2c3e50;
            color: white;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #ffd700;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .card img {
            width: 100%;
            height: 300px;
            object-fit: contain;
            background: white;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .filename {
            font-size: 1.2em;
            color: #ffd700;
            margin-bottom: 10px;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 1em;
            border-radius: 5px;
            border: 2px solid #ffd700;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🔍 請告訴我每張圖片是什麼寶可夢</h1>
    <p style="text-align: center; font-size: 1.2em; margin-bottom: 30px;">
        如果不是寶可夢，請在下方輸入框寫「不是」
    </p>
    
    <div class="grid">
        <div class="card">
            <div class="filename">IMG_9316.PNG</div>
            <img src="../images/pokemon/IMG_9316.PNG" alt="IMG_9316">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
        
        <div class="card">
            <div class="filename">IMG_9317.PNG</div>
            <img src="../images/pokemon/IMG_9317.PNG" alt="IMG_9317">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
        
        <div class="card">
            <div class="filename">IMG_9318.PNG</div>
            <img src="../images/pokemon/IMG_9318.PNG" alt="IMG_9318">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
        
        <div class="card">
            <div class="filename">IMG_9319 2.JPG</div>
            <img src="../images/pokemon/IMG_9319 2.JPG" alt="IMG_9319">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
        
        <div class="card">
            <div class="filename">IMG_9320.JPG</div>
            <img src="../images/pokemon/IMG_9320.JPG" alt="IMG_9320">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
        
        <div class="card">
            <div class="filename">IMG_9321 2.PNG</div>
            <img src="../images/pokemon/IMG_9321 2.PNG" alt="IMG_9321">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
        
        <div class="card">
            <div class="filename">IMG_9322 2.PNG</div>
            <img src="../images/pokemon/IMG_9322 2.PNG" alt="IMG_9322">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
        
        <div class="card">
            <div class="filename">IMG_9323 2.PNG</div>
            <img src="../images/pokemon/IMG_9323 2.PNG" alt="IMG_9323">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
        
        <div class="card">
            <div class="filename">IMG_9340 2.jpg</div>
            <img src="../images/pokemon/IMG_9340 2.jpg" alt="IMG_9340">
            <input type="text" placeholder="這是什麼寶可夢？">
        </div>
    </div>
</body>
</html>
