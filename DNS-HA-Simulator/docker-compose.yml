services:
  # ============================================
  # Primary Service (主機房 Web Server)
  # ============================================
  service-main:
    image: nginx:alpine
    container_name: service-main
    hostname: service-main
    networks:
      dns-ha-network:
        ipv4_address: 172.20.0.10
    volumes:
      - ./services/main:/usr/share/nginx/html:ro
    command: nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ============================================
  # Backup Service (備援機房 Web Server)
  # ============================================
  service-backup:
    image: nginx:alpine
    container_name: service-backup
    hostname: service-backup
    networks:
      dns-ha-network:
        ipv4_address: 172.20.0.20
    volumes:
      - ./services/backup:/usr/share/nginx/html:ro
    command: nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 3

  # ============================================
  # Primary DNS (模擬 Cloudflare - 完全故障)
  # ============================================
  dns-primary:
    image: sameersbn/bind:latest
    container_name: dns-primary
    hostname: dns-primary
    networks:
      dns-ha-network:
        ipv4_address: 172.20.0.100
    volumes:
      - ./dns_config/primary:/etc/bind:ro
    environment:
      - WEBMIN_INIT_SSL_ENABLED=false
    command: >
      sh -c "echo 'Primary DNS is intentionally disabled for simulation' &&
             sleep infinity"
    # 故意不啟動 DNS 服務，模擬完全故障

  # ============================================
  # Secondary DNS (模擬 Google DNS - 可修改)
  # ============================================
  dns-secondary:
    image: python:3.11-alpine
    container_name: dns-secondary
    hostname: dns-secondary
    networks:
      dns-ha-network:
        ipv4_address: 172.20.0.101
    volumes:
      - ./scripts/dns-server.py:/dns-server.py:ro
      - ./dns_config/secondary/zones:/zones:rw
    ports:
      - "5300:53/udp"
      - "5300:53/tcp"
    command: ["python3", "/dns-server.py"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # Controller (自動化監控與切換)
  # ============================================
  dns-controller:
    image: alpine:latest
    container_name: dns-controller
    hostname: dns-controller
    networks:
      dns-ha-network:
        ipv4_address: 172.20.0.5
    volumes:
      - ./scripts/monitor.sh:/monitor.sh:ro
      - ./dns_config/secondary/zones:/zones:rw
    command: ["/bin/sh", "/monitor.sh"]
    depends_on:
      - service-main
      - service-backup
      - dns-secondary
    environment:
      - TZ=Asia/Taipei
      - MAIN_SERVICE_IP=172.20.0.10
      - BACKUP_SERVICE_IP=172.20.0.20
      - DNS_SECONDARY_IP=172.20.0.101
      - CHECK_INTERVAL=5
    restart: unless-stopped

  # ============================================
  # Client (玩家端模擬)
  # ============================================
  dns-client:
    image: alpine:latest
    container_name: dns-client
    hostname: dns-client
    networks:
      dns-ha-network:
        ipv4_address: 172.20.0.50
    volumes:
      - ./scripts/client-test.sh:/client-test.sh:ro
    command: ["/bin/sh", "/client-test.sh"]
    depends_on:
      - dns-secondary
      - service-main
      - service-backup
    environment:
      - TZ=Asia/Taipei
      - DOMAIN=app.example.com
      - DNS_SERVER=172.20.0.101
      - CHECK_INTERVAL=2
    restart: unless-stopped

networks:
  dns-ha-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1

