-- ============================================
-- dnsdist Configuration for High-Performance DNS Resolver
-- Optimized for Kubernetes deployment with AWS NLB
-- ============================================

-- ============================================
-- 1. Network & Concurrency Optimization
-- ============================================
-- Enable SO_REUSEPORT for multi-threading
-- Adjust the number of addLocal calls based on CPU cores allocated to the container
-- Example: 4 CPU cores = 4 listeners
addLocal("0.0.0.0:53", {reusePort=true})
addLocal("0.0.0.0:53", {reusePort=true})
addLocal("0.0.0.0:53", {reusePort=true})
addLocal("0.0.0.0:53", {reusePort=true})

-- Enable TCP for large responses and zone transfers
addLocal("0.0.0.0:53", {reusePort=true, tcp=true})

-- ============================================
-- 2. Proxy Protocol v2 Support (AWS NLB)
-- ============================================
-- Trust Proxy Protocol headers only from VPC CIDR ranges
-- This prevents IP spoofing attacks
setProxyProtocolACL({
    "10.0.0.0/8",      -- RFC 1918 Private
    "172.16.0.0/12",   -- RFC 1918 Private
    "192.168.0.0/16"   -- RFC 1918 Private
})

-- ============================================
-- 3. Security ACL
-- ============================================
-- Allow all IPs (actual filtering should be done at AWS Security Group level)
addACL("0.0.0.0/0")
addACL("::/0")

-- ============================================
-- 4. Backend Pool Configuration
-- ============================================
-- Define Unbound backend pool with lazy health checks
newServer({
    address="127.0.0.1:5353",  -- Unbound sidecar in same pod
    pool="recursive",
    name="unbound-1",
    checkInterval=1,          -- Check every second
    healthCheckMode='lazy',   -- Only check when queries fail
    lazyHealthCheckThreshold=30, -- Trigger active probe after 30% query failures
    useProxyProtocol=true,    -- Forward real client IP to Unbound
    weight=100,
    order=1
})

-- Optional: Add more Unbound backends for redundancy
-- newServer({
--     address="unbound-2.dns.svc.cluster.local:5353",
--     pool="recursive",
--     name="unbound-2",
--     checkInterval=1,
--     healthCheckMode='lazy',
--     lazyHealthCheckThreshold=30,
--     useProxyProtocol=true,
--     weight=100,
--     order=2
-- })

-- ============================================
-- 5. Ring Buffer for Dynamic Blocking
-- ============================================
-- Increase ring buffer size for high-traffic environments
-- Default is too small and may miss attack patterns
setRingBuffersSize(1000000)

-- ============================================
-- 6. Dynamic Rate Limiting & Abuse Protection
-- ============================================
local dbr = dynBlockRulesGroup()

-- Query rate limiting: Block IPs exceeding 100 QPS over 10 seconds for 60 seconds
dbr:setQueryRate(100, 10, "Exceeded query rate", 60)

-- SERVFAIL rate limiting: Protect against Water Torture attacks
-- Block IPs causing >50 SERVFAIL responses in 10 seconds
dbr:setRCodeRate(DNSRCode.SERVFAIL, 50, 10, "Exceeded SERVFAIL rate", 60)

-- NXDOMAIN rate limiting: Protect against random subdomain attacks
dbr:setRCodeRate(DNSRCode.NXDOMAIN, 200, 10, "Exceeded NXDOMAIN rate", 60)

-- Apply dynamic blocking rules periodically
function maintenance()
    dbr:apply()
end

-- ============================================
-- 7. Fast Recovery & Fallback Logic
-- ============================================
-- Priority order:
-- 1. Try backend pool if available
-- 2. Try packet cache (even stale)
-- 3. Return SERVFAIL (not silent drop) to trigger client failover

addAction(PoolAvailableRule("recursive"), PoolAction("recursive"))
addAction(CacheHitResponseRule(), CacheResponseAction())
addAction(AllRule(), RCodeAction(DNSRCode.SERVFAIL))

-- ============================================
-- 8. Packet Cache Configuration
-- ============================================
-- Enable packet cache for performance
setMaxUDPOutstanding(65535)
setMaxTCPConnectionDuration(30)
setMaxTCPConnectionsPerClient(10)

-- ============================================
-- 9. DNSTAP Logging (Observability)
-- ============================================
-- Enable DNSTAP for structured logging
-- Logs will be sent to sidecar container via Unix socket
addDnstapLogging("unix:///var/run/dnstap/dnstap.sock")

-- Optional: Enable IP masking for privacy compliance
-- setDnstapLoggingMasking(true)

-- ============================================
-- 10. Prometheus Metrics
-- ============================================
-- Enable Prometheus metrics endpoint
webserver("0.0.0.0:8083")
setWebserverConfig({
    password="CHANGE_ME_IN_PRODUCTION",
    apiKey="CHANGE_ME_IN_PRODUCTION",
    acl="127.0.0.1,::1"
})

-- ============================================
-- 11. Lua Hooks for Custom Logic
-- ============================================
-- Example: Log suspicious patterns
function preresolve(dq)
    -- Add custom pre-resolution logic here
    -- e.g., additional ACL checks, custom rate limiting
    return false
end

function postresolve(dq)
    -- Add custom post-resolution logic here
    -- e.g., response modification, additional logging
    return false
end

-- ============================================
-- 12. Performance Tuning
-- ============================================
-- Set maximum packet size (EDNS0)
setMaxUDPQueriesWithoutAnswers(100)
setMaxTCPQueriesPerConnection(100)

-- Timeout settings
setLocal("0.0.0.0:53", {tcpRecvTimeout=2, tcpSendTimeout=2})

-- ============================================
-- End of Configuration
-- ============================================

