# GitLab CI/CD 安全掃描配置
# 包含代碼掃描、依賴掃描、容器掃描

stages:
  - security-scan
  - image-scan
  - compliance-check

variables:
  TRIVY_CACHE_DIR: .trivycache
  GOSEC_OUTPUT: gosec-report.json
  SEMGREP_OUTPUT: semgrep-report.json

# ============================================
# 1. 代碼安全掃描 (SAST)
# ============================================

# Gosec - Go 語言安全掃描
sast_gosec:
  stage: security-scan
  image: securego/gosec:latest
  script:
    - echo "🔍 開始 Gosec 安全掃描..."
    - |
      gosec -fmt json -out $GOSEC_OUTPUT ./... || true
      gosec -fmt sarif -out gosec-report.sarif ./... || true
    - |
      # 檢查高風險問題
      HIGH_ISSUES=$(jq -r '.Stats.Gnosec | select(. > 0)' $GOSEC_OUTPUT 2>/dev/null || echo "0")
      if [ "$HIGH_ISSUES" != "0" ] && [ "$HIGH_ISSUES" != "null" ]; then
        echo "❌ 發現高風險安全問題: $HIGH_ISSUES"
        cat $GOSEC_OUTPUT
        exit 1
      fi
      echo "✅ Gosec 掃描通過"
  artifacts:
    reports:
      sast: gosec-report.sarif
      codequality: $GOSEC_OUTPUT
    paths:
      - $GOSEC_OUTPUT
      - gosec-report.sarif
    expire_in: 30 days
  allow_failure: false
  only:
    - main
    - develop
    - merge_requests

# Semgrep - 通用代碼安全掃描
sast_semgrep:
  stage: security-scan
  image: returntocorp/semgrep:latest
  script:
    - echo "🔍 開始 Semgrep 安全掃描..."
    - |
      semgrep --config=auto \
        --json --output=$SEMGREP_OUTPUT \
        --error \
        --severity=ERROR \
        . || true
    - |
      # 檢查是否有 ERROR 級別的問題
      ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' $SEMGREP_OUTPUT 2>/dev/null || echo "0")
      if [ "$ERROR_COUNT" != "0" ] && [ "$ERROR_COUNT" != "null" ]; then
        echo "❌ 發現 ERROR 級別安全問題: $ERROR_COUNT"
        jq '.results[] | select(.extra.severity == "ERROR")' $SEMGREP_OUTPUT
        exit 1
      fi
      echo "✅ Semgrep 掃描通過"
  artifacts:
    reports:
      sast: $SEMGREP_OUTPUT
    paths:
      - $SEMGREP_OUTPUT
    expire_in: 30 days
  allow_failure: false
  only:
    - main
    - develop
    - merge_requests

# 敏感信息掃描
sast_secrets:
  stage: security-scan
  image: trufflesecurity/trufflehog:latest
  script:
    - echo "🔍 開始敏感信息掃描..."
    - |
      trufflehog filesystem . \
        --json \
        --only-verified \
        --fail > trufflehog-report.json || SCAN_EXIT=$?
      
      if [ -n "$SCAN_EXIT" ] && [ "$SCAN_EXIT" != "0" ]; then
        echo "❌ 發現敏感信息洩露"
        cat trufflehog-report.json
        exit 1
      fi
      echo "✅ 敏感信息掃描通過"
  artifacts:
    paths:
      - trufflehog-report.json
    expire_in: 7 days
  allow_failure: false
  only:
    - main
    - develop
    - merge_requests

# ============================================
# 2. 依賴掃描 (Dependency Scanning)
# ============================================

# Trivy - 依賴漏洞掃描
dependency_scan_trivy:
  stage: security-scan
  image: aquasec/trivy:latest
  script:
    - echo "🔍 開始依賴漏洞掃描..."
    - |
      trivy fs \
        --security-checks vuln \
        --severity HIGH,CRITICAL \
        --format json \
        --output trivy-dependency-report.json \
        . || true
    - |
      # 檢查是否有 HIGH 或 CRITICAL 漏洞
      CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-dependency-report.json 2>/dev/null || echo "0")
      HIGH_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-dependency-report.json 2>/dev/null || echo "0")
      
      if [ "$CRITICAL_COUNT" != "0" ] && [ "$CRITICAL_COUNT" != "null" ]; then
        echo "❌ 發現 CRITICAL 級別漏洞: $CRITICAL_COUNT"
        jq '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")' trivy-dependency-report.json
        exit 1
      fi
      
      if [ "$HIGH_COUNT" != "0" ] && [ "$HIGH_COUNT" != "null" ] && [ "$HIGH_COUNT" -gt 10 ]; then
        echo "⚠️ 發現 HIGH 級別漏洞: $HIGH_COUNT (超過閾值 10)"
        exit 1
      fi
      
      echo "✅ 依賴掃描通過"
  artifacts:
    reports:
      dependency_scanning: trivy-dependency-report.json
    paths:
      - trivy-dependency-report.json
    expire_in: 30 days
  allow_failure: false
  only:
    - main
    - develop
    - merge_requests

# ============================================
# 3. 容器鏡像掃描 (Container Scanning)
# ============================================

# Trivy - 容器鏡像掃描
container_scan_trivy:
  stage: image-scan
  image: aquasec/trivy:latest
  services:
    - docker:dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "🔍 開始容器鏡像掃描..."
    - |
      # 掃描構建好的鏡像
      IMAGE_TAG="$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      
      trivy image \
        --security-checks vuln,config \
        --severity HIGH,CRITICAL \
        --format json \
        --output trivy-image-report.json \
        --exit-code 0 \
        $IMAGE_TAG || true
    - |
      # 檢查漏洞
      CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-image-report.json 2>/dev/null || echo "0")
      HIGH_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-image-report.json 2>/dev/null || echo "0")
      
      if [ "$CRITICAL_COUNT" != "0" ] && [ "$CRITICAL_COUNT" != "null" ]; then
        echo "❌ 鏡像包含 CRITICAL 級別漏洞: $CRITICAL_COUNT"
        jq '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")' trivy-image-report.json
        exit 1
      fi
      
      if [ "$HIGH_COUNT" != "0" ] && [ "$HIGH_COUNT" != "null" ] && [ "$HIGH_COUNT" -gt 5 ]; then
        echo "⚠️ 鏡像包含 HIGH 級別漏洞: $HIGH_COUNT (超過閾值 5)"
        exit 1
      fi
      
      echo "✅ 容器鏡像掃描通過"
  artifacts:
    reports:
      container_scanning: trivy-image-report.json
    paths:
      - trivy-image-report.json
    expire_in: 30 days
  allow_failure: false
  only:
    - main
    - develop
  dependencies:
    - build

# 鏡像簽名驗證
image_sign_verify:
  stage: image-scan
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - apk add --no-cache curl
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "🔐 驗證鏡像簽名..."
    - |
      IMAGE_TAG="$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      
      # 檢查鏡像是否已簽名
      if ! docker trust inspect $IMAGE_TAG > /dev/null 2>&1; then
        echo "❌ 鏡像未簽名或簽名驗證失敗"
        exit 1
      fi
      
      echo "✅ 鏡像簽名驗證通過"
  allow_failure: false
  only:
    - main
  dependencies:
    - build

# ============================================
# 4. 合規性檢查
# ============================================

# 安全合規性檢查
security_compliance:
  stage: compliance-check
  image: alpine:latest
  script:
    - apk add --no-cache curl jq
    - |
      echo "📋 安全合規性檢查..."
      
      # 檢查所有安全掃描是否通過
      SCAN_RESULTS=""
      
      # 檢查 Gosec
      if [ -f "$GOSEC_OUTPUT" ]; then
        GOSEC_ISSUES=$(jq -r '.Stats.Gnosec // 0' $GOSEC_OUTPUT 2>/dev/null || echo "0")
        if [ "$GOSEC_ISSUES" != "0" ] && [ "$GOSEC_ISSUES" != "null" ]; then
          SCAN_RESULTS="${SCAN_RESULTS}Gosec: 發現 $GOSEC_ISSUES 個問題\n"
        fi
      fi
      
      # 檢查依賴掃描
      if [ -f "trivy-dependency-report.json" ]; then
        DEP_CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-dependency-report.json 2>/dev/null || echo "0")
        if [ "$DEP_CRITICAL" != "0" ] && [ "$DEP_CRITICAL" != "null" ]; then
          SCAN_RESULTS="${SCAN_RESULTS}依賴掃描: 發現 $DEP_CRITICAL 個 CRITICAL 漏洞\n"
        fi
      fi
      
      # 檢查鏡像掃描
      if [ -f "trivy-image-report.json" ]; then
        IMG_CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-image-report.json 2>/dev/null || echo "0")
        if [ "$IMG_CRITICAL" != "0" ] && [ "$IMG_CRITICAL" != "null" ]; then
          SCAN_RESULTS="${SCAN_RESULTS}鏡像掃描: 發現 $IMG_CRITICAL 個 CRITICAL 漏洞\n"
        fi
      fi
      
      if [ -n "$SCAN_RESULTS" ]; then
        echo "❌ 合規性檢查失敗:"
        echo -e "$SCAN_RESULTS"
        exit 1
      fi
      
      echo "✅ 安全合規性檢查通過"
  allow_failure: false
  only:
    - main
  dependencies:
    - sast_gosec
    - dependency_scan_trivy
    - container_scan_trivy

# 生成安全報告
security_report:
  stage: compliance-check
  image: alpine:latest
  script:
    - apk add --no-cache curl jq
    - |
      echo "📊 生成安全報告..."
      
      REPORT_FILE="security_report_$(date +%Y%m%d_%H%M%S).json"
      
      cat > $REPORT_FILE <<EOF
      {
        "project_id": $CI_PROJECT_ID,
        "branch": "$CI_COMMIT_REF_NAME",
        "commit": "$CI_COMMIT_SHA",
        "timestamp": "$(date -Iseconds)",
        "scans": {
          "sast": {
            "gosec": "$([ -f "$GOSEC_OUTPUT" ] && echo "completed" || echo "skipped")",
            "semgrep": "$([ -f "$SEMGREP_OUTPUT" ] && echo "completed" || echo "skipped")"
          },
          "dependency": "$([ -f "trivy-dependency-report.json" ] && echo "completed" || echo "skipped")",
          "container": "$([ -f "trivy-image-report.json" ] && echo "completed" || echo "skipped")"
        },
        "compliance": "passed"
      }
      EOF
      
      cat $REPORT_FILE
  artifacts:
    paths:
      - security_report_*.json
    expire_in: 90 days
  only:
    - main
  when: always

