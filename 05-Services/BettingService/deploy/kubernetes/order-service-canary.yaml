apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-canary
  namespace: betting-service
  labels:
    app: order-service
    version: canary
spec:
  replicas: 1  # 10% 流量（總共 10 個 Pod，1 個 Canary）
  selector:
    matchLabels:
      app: order-service
      version: canary
  template:
    metadata:
      labels:
        app: order-service
        version: canary
    spec:
      containers:
      - name: order-service
        image: betting-service/order-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: VERSION
          value: "canary"
        - name: SERVER_PORT
          value: "8080"
        - name: DB_HOST
          value: "postgres-service"
        - name: REDIS_HOST
          value: "redis-service"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order-service-canary
  namespace: betting-service
spec:
  selector:
    app: order-service
    version: canary
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

