# Kubernetes RBAC 配置 - 生產環境訪問控制
# 確保維運人員無法直接接觸生產環境

apiVersion: v1
kind: Namespace
metadata:
  name: betting-service-prod
  labels:
    environment: production
    access-control: strict

---
# Service Account - 僅用於 CI/CD 自動化部署
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-cd-deployer
  namespace: betting-service-prod
  annotations:
    description: "CI/CD 自動化部署服務帳號，無人工訪問權限"

---
# ClusterRole - CI/CD 部署權限（最小權限）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ci-cd-deployer
rules:
  # 僅允許部署操作
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  # 禁止刪除操作
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["delete"]
    effect: "Deny"
  # 禁止訪問 Secrets（敏感信息）
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["*"]
    effect: "Deny"
  # 禁止修改 RBAC
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
    effect: "Deny"

---
# ClusterRoleBinding - 綁定 CI/CD Service Account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ci-cd-deployer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ci-cd-deployer
subjects:
  - kind: ServiceAccount
    name: ci-cd-deployer
    namespace: betting-service-prod

---
# Role - 監控和讀取權限（維運人員）
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: production-readonly
  namespace: betting-service-prod
rules:
  # 只讀權限
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # 禁止寫入操作
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["create", "update", "patch", "delete"]
    effect: "Deny"
  # 禁止執行命令
  - apiGroups: [""]
    resources: ["pods/exec", "pods/attach"]
    verbs: ["*"]
    effect: "Deny"
  # 禁止訪問日誌（可能包含敏感信息）
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["*"]
    effect: "Deny"

---
# RoleBinding - 綁定維運人員（只讀）
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: production-readonly-binding
  namespace: betting-service-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: production-readonly
subjects:
  # 這裡應該綁定實際的用戶或組
  # 示例：綁定到 Kubernetes 用戶組
  - kind: Group
    name: ops-team
    apiGroup: rbac.authorization.k8s.io

---
# NetworkPolicy - 網絡隔離
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: production-isolation
  namespace: betting-service-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # 僅允許來自 Gateway 的流量
    - from:
        - namespaceSelector:
            matchLabels:
              name: betting-service-gateway
      ports:
        - protocol: TCP
          port: 8080
    # 僅允許來自監控系統的流量
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # 僅允許訪問數據庫和 Redis
    - to:
        - namespaceSelector:
            matchLabels:
              name: betting-service-data
      ports:
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6379  # Redis
    # 允許訪問監控系統
    - to:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090  # Prometheus

---
# Pod Security Policy (如果啟用)
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: production-psp
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
  readOnlyRootFilesystem: true

