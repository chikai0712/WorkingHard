<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>繪圖畫板 - Drawing Board</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>🎨 繪圖畫板</h1>
            <div class="header-actions">
                <button id="galleryBtn" class="btn btn-info">📚 圖片庫</button>
                <button id="clearBtn" class="btn btn-danger">清除</button>
                <button id="undoBtn" class="btn btn-secondary">撤銷</button>
                <button id="redoBtn" class="btn btn-secondary">重做</button>
                <button id="saveBtn" class="btn btn-primary">保存圖片</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Toolbar -->
            <aside class="toolbar">
                <div class="tool-section">
                    <h3>工具</h3>
                    <div class="tool-buttons">
                        <button id="brushTool" class="tool-btn active" data-tool="brush" title="畫筆">
                            ✏️ 畫筆
                        </button>
                        <button id="eraserTool" class="tool-btn" data-tool="eraser" title="橡皮擦">
                            🧹 橡皮擦
                        </button>
                        <button id="lineTool" class="tool-btn" data-tool="line" title="直線">
                            📏 直線
                        </button>
                        <button id="rectTool" class="tool-btn" data-tool="rect" title="矩形">
                            ⬜ 矩形
                        </button>
                        <button id="circleTool" class="tool-btn" data-tool="circle" title="圓形">
                            ⭕ 圓形
                        </button>
                    </div>
                </div>

                <div class="tool-section">
                    <h3>畫筆類型</h3>
                    <div class="tool-buttons">
                        <button id="brushSolid" class="brush-type-btn active" data-brush-type="solid" title="實心畫筆">
                            ⚫ 實心
                        </button>
                        <button id="brushDashed" class="brush-type-btn" data-brush-type="dashed" title="虛線">
                            ➖ 虛線
                        </button>
                        <button id="brushDotted" class="brush-type-btn" data-brush-type="dotted" title="點線">
                            ⚬ 點線
                        </button>
                        <button id="brushSpray" class="brush-type-btn" data-brush-type="spray" title="噴槍">
                            💨 噴槍
                        </button>
                        <button id="brushMarker" class="brush-type-btn" data-brush-type="marker" title="標記筆">
                            🖍️ 標記筆
                        </button>
                    </div>
                </div>

                <div class="tool-section">
                    <h3>顏色</h3>
                    <div class="color-picker-container">
                        <input type="color" id="colorPicker" value="#000000">
                        <div class="color-presets">
                            <div class="color-preset" style="background: #000000" data-color="#000000"></div>
                            <div class="color-preset" style="background: #ff0000" data-color="#ff0000"></div>
                            <div class="color-preset" style="background: #00ff00" data-color="#00ff00"></div>
                            <div class="color-preset" style="background: #0000ff" data-color="#0000ff"></div>
                            <div class="color-preset" style="background: #ffff00" data-color="#ffff00"></div>
                            <div class="color-preset" style="background: #ff00ff" data-color="#ff00ff"></div>
                            <div class="color-preset" style="background: #00ffff" data-color="#00ffff"></div>
                            <div class="color-preset" style="background: #ffffff" data-color="#ffffff"></div>
                        </div>
                    </div>
                </div>

                <div class="tool-section">
                    <h3>筆刷大小</h3>
                    <div class="brush-size-container">
                        <input type="range" id="brushSize" min="1" max="50" value="5">
                        <span id="brushSizeValue">5</span>
                    </div>
                    <div class="brush-preview"></div>
                </div>

                <div class="tool-section">
                    <h3>透明度</h3>
                    <div class="opacity-container">
                        <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="1">
                        <span id="opacityValue">100%</span>
                    </div>
                </div>
            </aside>

            <!-- Canvas Area -->
            <div class="canvas-container">
                <div class="zoom-controls">
                    <button id="zoomOutBtn" class="zoom-btn" title="縮小">🔍-</button>
                    <input type="range" id="zoomSlider" min="25" max="500" value="100" step="5">
                    <button id="zoomInBtn" class="zoom-btn" title="放大">🔍+</button>
                    <span id="zoomValue">100%</span>
                    <button id="resetZoomBtn" class="zoom-btn" title="重置縮放">↺</button>
                </div>
                <div class="canvas-wrapper" id="canvasWrapper">
                    <canvas id="drawingCanvas"></canvas>
                </div>
            </div>
        </main>

        <!-- Gallery Modal -->
        <div id="galleryModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>🎨 著色圖片庫</h2>
                    <button class="modal-close" id="closeGalleryBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="gallery-controls">
                        <div class="upload-section">
                            <label for="imageUpload" class="btn btn-primary upload-btn">
                                📤 上傳本地圖片
                            </label>
                            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                            <span class="upload-hint">（推薦：可直接上傳您下載的著色圖）</span>
                        </div>
                        <input type="text" id="imageSearch" placeholder="搜尋圖片名稱或分類..." class="search-input">
                        <select id="categoryFilter" class="category-select">
                            <option value="">全部分類</option>
                        </select>
                        <button id="loadImageBtn" class="btn btn-primary">載入選中圖片</button>
                    </div>
                    <div id="galleryGrid" class="gallery-grid">
                        <!-- 圖片將動態載入 -->
                    </div>
                    <div id="galleryLoading" class="loading">載入中...</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>使用滑鼠或觸控螢幕來繪圖 | 按 Ctrl+Z 撤銷，Ctrl+Y 重做</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
