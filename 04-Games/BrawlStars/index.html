<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荒野亂鬥 - Brawl Stars</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>⚔️ 荒野亂鬥</h1>
            <div class="header-actions">
                <button id="characterManagerBtn" class="btn btn-primary">👤 角色管理</button>
                <button id="aiGenerateBtn" class="btn btn-info">🤖 AI 生成角色</button>
                <button id="startGameBtn" class="btn btn-success">🎮 開始遊戲</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Character Selection -->
            <section id="characterSelection" class="character-selection">
                <h2>選擇角色</h2>
                <div id="characterGrid" class="character-grid">
                    <!-- 角色卡片將動態載入 -->
                </div>
            </section>

            <!-- Game Arena -->
            <section id="gameArena" class="game-arena hidden">
                <canvas id="gameCanvas"></canvas>
                <div class="game-ui">
                    <div class="player-info">
                        <div class="player-card">
                            <div class="player-avatar" id="playerAvatar"></div>
                            <div class="player-stats">
                                <div class="stat">
                                    <span class="stat-label">生命值:</span>
                                    <div class="health-bar">
                                        <div class="health-fill" id="playerHealth"></div>
                                    </div>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">攻擊力:</span>
                                    <span id="playerAttack"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="enemy-info">
                        <div class="enemy-card">
                            <div class="enemy-avatar" id="enemyAvatar"></div>
                            <div class="enemy-stats">
                                <div class="stat">
                                    <span class="stat-label">生命值:</span>
                                    <div class="health-bar">
                                        <div class="health-fill" id="enemyHealth"></div>
                                    </div>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">攻擊力:</span>
                                    <span id="enemyAttack"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="game-controls">
                    <div class="control-hint">
                        <p>🎮 操作說明：WASD/方向鍵移動，滑鼠點擊/右半屏攻擊</p>
                        <p style="font-size: 0.85rem; margin-top: 0.25rem; opacity: 0.8;">
                            💡 提示：靠近敵人時會自動瞄準，遠程角色會顯示攻擊範圍
                        </p>
                    </div>
                    <button id="specialBtn" class="btn btn-warning">✨ 特殊技能</button>
                    <button id="endGameBtn" class="btn btn-secondary">🏁 結束遊戲</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Character Manager Modal -->
    <div id="characterManagerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>👤 角色管理</h2>
                <button class="modal-close" id="closeManagerBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="manager-controls">
                    <button id="addCharacterBtn" class="btn btn-primary">➕ 新增角色</button>
                    <input type="text" id="characterSearch" placeholder="搜尋角色..." class="search-input">
                </div>
                <div id="managerCharacterGrid" class="character-grid">
                    <!-- 管理界面的角色列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Character Modal -->
    <div id="characterFormModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="formTitle">➕ 新增角色</h2>
                <button class="modal-close" id="closeFormBtn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="characterForm">
                    <div class="form-group">
                        <label for="charName">角色名稱</label>
                        <input type="text" id="charName" required>
                    </div>
                    <div class="form-group">
                        <label for="charDescription">角色描述</label>
                        <textarea id="charDescription" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="charHealth">生命值</label>
                            <input type="number" id="charHealth" min="1" max="1000" value="100" required>
                        </div>
                        <div class="form-group">
                            <label for="charAttack">攻擊力</label>
                            <input type="number" id="charAttack" min="1" max="200" value="20" required>
                        </div>
                        <div class="form-group">
                            <label for="charDefense">防禦力</label>
                            <input type="number" id="charDefense" min="0" max="100" value="10" required>
                        </div>
                        <div class="form-group">
                            <label for="charSpeed">速度</label>
                            <input type="number" id="charSpeed" min="1" max="100" value="50" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="charColor">角色顏色</label>
                        <input type="color" id="charColor" value="#ff6b6b">
                    </div>
                    <div class="form-group">
                        <label for="charSpecial">特殊技能</label>
                        <input type="text" id="charSpecial" placeholder="例如：火焰攻擊">
                    </div>
                    <div class="form-group">
                        <label for="charImage">角色圖片 URL（可選）</label>
                        <input type="url" id="charImage" placeholder="https://...">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">儲存</button>
                        <button type="button" class="btn btn-secondary" id="cancelFormBtn">取消</button>
                    </div>
                    <input type="hidden" id="charId">
                </form>
            </div>
        </div>
    </div>

    <!-- AI Generate Modal -->
    <div id="aiGenerateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🤖 AI 生成角色</h2>
                <button class="modal-close" id="closeAIBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="ai-controls">
                    <div class="form-group">
                        <label for="aiPrompt">角色描述提示詞</label>
                        <textarea id="aiPrompt" rows="4" placeholder="例如：一個擁有火焰能力的戰士，速度快，攻擊力高"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="aiStyle">角色風格</label>
                        <select id="aiStyle">
                            <option value="warrior">戰士</option>
                            <option value="mage">法師</option>
                            <option value="archer">弓箭手</option>
                            <option value="tank">坦克</option>
                            <option value="assassin">刺客</option>
                        </select>
                    </div>
                    <button id="generateCharacterBtn" class="btn btn-primary">🎨 生成角色</button>
                </div>
                <div id="aiResult" class="ai-result hidden">
                    <h3>生成的角色：</h3>
                    <div id="generatedCharacterPreview" class="character-card"></div>
                    <div class="form-actions">
                        <button id="saveGeneratedBtn" class="btn btn-success">✅ 儲存角色</button>
                        <button id="regenerateBtn" class="btn btn-secondary">🔄 重新生成</button>
                    </div>
                </div>
                <div id="aiLoading" class="loading hidden">正在生成角色...</div>
            </div>
        </div>
    </div>

    <script src="character.js"></script>
    <script src="game-realtime.js"></script>
    <script src="ai-generator.js"></script>
    <script src="script.js"></script>
</body>
</html>
