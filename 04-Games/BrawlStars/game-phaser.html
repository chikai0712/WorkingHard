<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荒野亂鬥 - Phaser 3 版本</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        canvas { 
            display: block; 
            margin: 0 auto; 
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }
        #ammoBar {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .ammoSlot {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.3s;
        }
        .ammoSlot.filled {
            background: rgba(241, 196, 15, 0.8);
            border-color: #f1c40f;
        }
        .ammoSlot.reloading {
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        #instructions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>生命值: <span id="healthText">100</span></div>
        <div id="ammoBar"></div>
    </div>
    <div id="instructions">
        WASD 移動 | 滑鼠點擊射擊 | 彈藥自動回復
    </div>

<script>
// 遊戲配置
const config = {
    type: Phaser.AUTO,
    width: 1000,
    height: 600,
    backgroundColor: '#2c3e50',
    physics: {
        default: 'arcade',
        arcade: { 
            debug: false,
            gravity: { y: 0 }
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

const game = new Phaser.Game(config);

// 全局變數
let player;
let enemy;
let cursors;
let bullets;
let enemyBullets;
let ammo = 3;
let maxAmmo = 3;
let reloadTimer = 0;
let reloadTime = 1500; // 1.5秒回一格彈藥
let playerCharacter = null;
let enemyCharacter = null;

// 載入角色資料（從 localStorage）
function loadCharacterData() {
    try {
        const saved = localStorage.getItem('brawlStarsCharacters');
        if (saved) {
            const characters = JSON.parse(saved);
            playerCharacter = characters[0] || getDefaultCharacter();
            enemyCharacter = characters[1] || getDefaultCharacter();
        } else {
            playerCharacter = getDefaultCharacter();
            enemyCharacter = getDefaultCharacter();
        }
    } catch (e) {
        console.error('載入角色資料失敗:', e);
        playerCharacter = getDefaultCharacter();
        enemyCharacter = getDefaultCharacter();
    }
    
    // 確保顏色格式正確（將 #ffffff 轉換為 0xffffff）
    if (typeof playerCharacter.color === 'string' && playerCharacter.color.startsWith('#')) {
        playerCharacter.color = parseInt(playerCharacter.color.replace('#', '0x'));
    }
    if (typeof enemyCharacter.color === 'string' && enemyCharacter.color.startsWith('#')) {
        enemyCharacter.color = parseInt(enemyCharacter.color.replace('#', '0x'));
    }
}

function getDefaultCharacter() {
    return {
        name: '戰士',
        health: 100,
        attack: 20,
        defense: 10,
        speed: 200,
        range: 5,
        attackType: 'ranged',
        color: 0x3498db,
        emoji: '⚔️'
    };
}

function preload() {
    // Phaser 3 不需要預載圖片，我們使用繪圖 API
}

function create() {
    // 載入角色資料
    loadCharacterData();
    
    console.log('玩家角色:', playerCharacter);
    console.log('敵人角色:', enemyCharacter);
    
    // 創建玩家（使用簡單的圓形和文字）
    const playerColor = playerCharacter.color || 0x3498db;
    player = this.add.circle(400, 300, 30, playerColor);
    player.setStrokeStyle(3, 0xffffff);
    
    // 添加 emoji 文字
    const playerText = this.add.text(400, 300, playerCharacter.emoji || '⚔️', {
        fontSize: '32px',
        align: 'center'
    });
    playerText.setOrigin(0.5);
    
    // 將文字添加到玩家容器（使用簡單的組合）
    player.textObject = playerText;
    
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    player.body.setCircle(30);
    
    // 創建敵人
    const enemyColor = enemyCharacter.color || 0xe74c3c;
    enemy = this.add.circle(600, 300, 30, enemyColor);
    enemy.setStrokeStyle(3, 0xffffff);
    
    // 添加 emoji 文字
    const enemyText = this.add.text(600, 300, enemyCharacter.emoji || '⚔️', {
        fontSize: '32px',
        align: 'center'
    });
    enemyText.setOrigin(0.5);
    
    // 將文字添加到敵人容器
    enemy.textObject = enemyText;
    
    this.physics.add.existing(enemy);
    enemy.body.setCollideWorldBounds(true);
    enemy.body.setCircle(30);
    
    // 初始化玩家屬性
    player.maxHealth = playerCharacter.health || 100;
    player.currentHealth = player.maxHealth;
    player.attack = playerCharacter.attack || 20;
    player.defense = playerCharacter.defense || 10;
    player.speed = playerCharacter.speed || 200;
    player.range = playerCharacter.range || 5;
    
    // 初始化敵人屬性
    enemy.maxHealth = enemyCharacter.health || 100;
    enemy.currentHealth = enemy.maxHealth;
    enemy.attack = enemyCharacter.attack || 20;
    enemy.defense = enemyCharacter.defense || 10;
    enemy.speed = enemyCharacter.speed || 150; // AI 稍慢
    enemy.range = enemyCharacter.range || 5;
    enemy.aiTimer = 0;
    enemy.canAttack = true;
    enemy.attackCooldown = 0;
    
    // 創建子彈組
    bullets = this.physics.add.group({
        defaultKey: 'bullet',
        maxSize: 50
    });
    
    enemyBullets = this.physics.add.group({
        defaultKey: 'bullet',
        maxSize: 50
    });
    
    // 輸入控制
    cursors = this.input.keyboard.addKeys({
        up: Phaser.Input.Keyboard.KeyCodes.W,
        down: Phaser.Input.Keyboard.KeyCodes.S,
        left: Phaser.Input.Keyboard.KeyCodes.A,
        right: Phaser.Input.Keyboard.KeyCodes.D
    });
    
    // 點擊射擊
    this.input.on('pointerdown', (pointer) => {
        const playerColor = playerCharacter.color || 0x3498db;
        fireBullet.call(this, pointer, player, bullets, playerColor);
    });
    
    // 碰撞檢測
    this.physics.add.overlap(bullets, enemy, (bullet, enemy) => {
        hitEnemy.call(this, bullet, enemy);
    });
    
    this.physics.add.overlap(enemyBullets, player, (bullet, player) => {
        hitPlayer.call(this, bullet, player);
    });
    
    // 初始化 UI
    initAmmoUI();
    updateHealthUI();
    
    // 添加背景網格
    drawGrid.call(this);
}

function drawGrid() {
    const graphics = this.add.graphics();
    graphics.lineStyle(1, 0x34495e, 0.3);
    
    // 繪製網格
    for (let i = 0; i < config.width; i += 50) {
        graphics.moveTo(i, 0);
        graphics.lineTo(i, config.height);
    }
    for (let i = 0; i < config.height; i += 50) {
        graphics.moveTo(0, i);
        graphics.lineTo(config.width, i);
    }
    graphics.strokePath();
}

function update(time, delta) {
    if (!player || !enemy) return;
    
    // 玩家移動
    player.body.setVelocity(0);
    
    if (cursors.left.isDown) player.body.setVelocityX(-player.speed);
    else if (cursors.right.isDown) player.body.setVelocityX(player.speed);
    
    if (cursors.up.isDown) player.body.setVelocityY(-player.speed);
    else if (cursors.down.isDown) player.body.setVelocityY(player.speed);
    
    // 更新文字位置（跟隨玩家）
    if (player.textObject) {
        player.textObject.x = player.x;
        player.textObject.y = player.y;
    }
    
    // 更新敵人文字位置
    if (enemy.textObject) {
        enemy.textObject.x = enemy.x;
        enemy.textObject.y = enemy.y;
    }
    
    // 彈藥自動回復
    if (ammo < maxAmmo) {
        reloadTimer += delta;
        if (reloadTimer >= reloadTime) {
            ammo++;
            reloadTimer = 0;
            updateAmmoUI();
        } else {
            // 更新裝彈動畫
            const progress = reloadTimer / reloadTime;
            updateReloadAnimation(progress);
        }
    }
    
    // 敵人 AI
    updateEnemyAI.call(this, delta);
    
    // 更新敵人攻擊冷卻
    if (enemy.attackCooldown > 0) {
        enemy.attackCooldown -= delta;
        if (enemy.attackCooldown <= 0) {
            enemy.canAttack = true;
        }
    }
    
    // 清理超出邊界的子彈
    bullets.getChildren().forEach(bullet => {
        if (bullet.active && (bullet.y < 0 || bullet.y > config.height || 
            bullet.x < 0 || bullet.x > config.width)) {
            bullet.setActive(false);
            bullet.setVisible(false);
        }
    });
    
    enemyBullets.getChildren().forEach(bullet => {
        if (bullet.active && (bullet.y < 0 || bullet.y > config.height || 
            bullet.x < 0 || bullet.x > config.width)) {
            bullet.setActive(false);
            bullet.setVisible(false);
        }
    });
    
    // 檢查勝利條件
    if (player.currentHealth <= 0) {
        showGameOver('你輸了！');
    } else if (enemy.currentHealth <= 0) {
        showGameOver('你贏了！');
    }
}

function updateEnemyAI(delta) {
    if (!player || !enemy) return;
    
    const distance = Phaser.Math.Distance.Between(
        enemy.x, enemy.y, 
        player.x, player.y
    );
    
    // AI 行為：追擊玩家
    if (distance > enemy.range * 50) {
        // 追擊
        const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
        const speed = enemy.speed * 0.8; // AI 移動稍慢
        enemy.body.setVelocity(
            Math.cos(angle) * speed,
            Math.sin(angle) * speed
        );
    } else {
        // 在攻擊範圍內，停止移動並攻擊
        enemy.body.setVelocity(0);
        
        if (enemy.canAttack && distance <= enemy.range * 50) {
            // 攻擊玩家
            const pointer = { x: player.x, y: player.y };
            const enemyColor = enemyCharacter.color || 0xe74c3c;
            fireBullet.call(this, pointer, enemy, enemyBullets, enemyColor);
            enemy.canAttack = false;
            enemy.attackCooldown = 2000; // 2秒冷卻
        }
    }
    
    // 朝向玩家（可選，如果不旋轉可以註釋掉）
    // const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
    // enemy.rotation = angle + Math.PI / 2;
}

function fireBullet(pointer, shooter, bulletGroup, bulletColor) {
    if (!shooter || !pointer) return;
    
    // 檢查是否為玩家且有彈藥（核心機制：彈藥限制）
    if (shooter === player && ammo <= 0) {
        return; // 沒有彈藥，無法射擊
    }
    
    // 檢查攻擊冷卻（敵人）
    if (shooter === enemy && !enemy.canAttack) {
        return;
    }
    
    // 轉換顏色格式
    const bulletColorNum = (typeof bulletColor === 'string' && bulletColor.startsWith('#')) 
        ? parseInt(bulletColor.replace('#', '0x'))
        : (bulletColor || 0xf1c40f);
    
    // 獲取可用子彈或創建新子彈
    let bullet = bulletGroup.get();
    
    if (!bullet) {
        bullet = this.add.circle(shooter.x, shooter.y, 6, bulletColorNum);
        this.physics.add.existing(bullet);
        bulletGroup.add(bullet);
    } else {
        bullet.setActive(true);
        bullet.setVisible(true);
        bullet.setPosition(shooter.x, shooter.y);
        bullet.setFillStyle(bulletColorNum);
    }
    
    // 計算射擊角度
    const angle = Phaser.Math.Angle.Between(shooter.x, shooter.y, pointer.x, pointer.y);
    
    // 設定子彈速度
    const bulletSpeed = 500;
    bullet.body.setVelocity(
        Math.cos(angle) * bulletSpeed,
        Math.sin(angle) * bulletSpeed
    );
    
    // 設定子彈屬性
    bullet.damage = shooter.attack;
    bullet.owner = shooter === player ? 'player' : 'enemy';
    
    // 如果是玩家，消耗彈藥
    if (shooter === player) {
        ammo--;
        reloadTimer = 0;
        updateAmmoUI();
    }
    
    // 子彈生命週期（自動消失）
    this.time.delayedCall(2000, () => {
        if (bullet && bullet.active) {
            bullet.setActive(false);
            bullet.setVisible(false);
        }
    });
}

function hitEnemy(bullet, enemy) {
    if (bullet.active && bullet.owner === 'player' && enemy) {
        const damage = Math.max(1, bullet.damage - enemy.defense);
        enemy.currentHealth = Math.max(0, enemy.currentHealth - damage);
        
        // 視覺反饋
        enemy.setTint(0xff0000);
        if (enemy.textObject) {
            enemy.textObject.setTint(0xff0000);
        }
        this.time.delayedCall(100, () => {
            enemy.clearTint();
            if (enemy.textObject) {
                enemy.textObject.clearTint();
            }
        });
        
        bullet.setActive(false);
        bullet.setVisible(false);
        
        updateHealthUI();
    }
}

function hitPlayer(bullet, player) {
    if (bullet.active && bullet.owner === 'enemy' && player) {
        const damage = Math.max(1, bullet.damage - player.defense);
        player.currentHealth = Math.max(0, player.currentHealth - damage);
        
        // 視覺反饋
        player.setTint(0xff0000);
        if (player.textObject) {
            player.textObject.setTint(0xff0000);
        }
        this.time.delayedCall(100, () => {
            player.clearTint();
            if (player.textObject) {
                player.textObject.clearTint();
            }
        });
        
        bullet.setActive(false);
        bullet.setVisible(false);
        
        updateHealthUI();
    }
}

function initAmmoUI() {
    const ammoBar = document.getElementById('ammoBar');
    ammoBar.innerHTML = '';
    for (let i = 0; i < maxAmmo; i++) {
        const slot = document.createElement('div');
        slot.className = 'ammoSlot';
        if (i < ammo) {
            slot.classList.add('filled');
            slot.textContent = '●';
        }
        ammoBar.appendChild(slot);
    }
}

function updateAmmoUI() {
    const slots = document.querySelectorAll('.ammoSlot');
    slots.forEach((slot, index) => {
        if (index < ammo) {
            slot.classList.add('filled');
            slot.textContent = '●';
        } else {
            slot.classList.remove('filled');
            slot.textContent = '';
        }
        
        // 裝彈動畫
        if (index === ammo && ammo < maxAmmo) {
            slot.classList.add('reloading');
        } else {
            slot.classList.remove('reloading');
        }
    });
}

function updateReloadAnimation(progress) {
    const slots = document.querySelectorAll('.ammoSlot');
    const nextSlotIndex = ammo;
    if (nextSlotIndex < maxAmmo) {
        const nextSlot = slots[nextSlotIndex];
        if (nextSlot) {
            nextSlot.style.opacity = 0.3 + progress * 0.7;
        }
    }
}

function updateHealthUI() {
    const healthText = document.getElementById('healthText');
    if (player && player.currentHealth !== undefined) {
        healthText.textContent = Math.max(0, player.currentHealth) + ' / ' + player.maxHealth;
    }
}

function showGameOver(message) {
    // 暫停遊戲
    game.scene.pause();
    
    // 顯示結果
    const result = document.createElement('div');
    result.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 40px 60px;
        border-radius: 12px;
        font-size: 32px;
        text-align: center;
        z-index: 2000;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    `;
    result.textContent = message;
    
    const restartBtn = document.createElement('button');
    restartBtn.textContent = '重新開始';
    restartBtn.style.cssText = `
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 18px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    `;
    restartBtn.onclick = () => {
        location.reload();
    };
    
    result.appendChild(document.createElement('br'));
    result.appendChild(restartBtn);
    document.body.appendChild(result);
}
</script>

</body>
</html>
