<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>測試圖片生成</title>
</head>
<body>
    <h1>測試成語圖片生成</h1>
    <div id="testResults"></div>
    
    <script src="picture-generator.js"></script>
    <script>
        const generator = new IdiomPictureGenerator();
        const testIdioms = ['雨過天晴', '一石二鳥', '畫蛇添足', '朝三暮四', '三言兩語'];
        const container = document.getElementById('testResults');
        
        async function testPictureGeneration() {
            container.innerHTML = '<p>開始測試...</p>';
            
            for (const idiom of testIdioms) {
                try {
                    console.log('測試成語:', idiom);
                    const pictureData = await generator.generatePicture(idiom);
                    
                    const div = document.createElement('div');
                    div.style.cssText = 'margin: 20px; padding: 20px; border: 1px solid #ccc;';
                    div.innerHTML = `
                        <h3>${idiom}</h3>
                        <img src="${pictureData}" style="max-width: 300px; border: 2px solid #333;" />
                        <p>數據類型: ${typeof pictureData}</p>
                        <p>數據長度: ${pictureData ? pictureData.length : 0}</p>
                        <p>是否為圖片: ${pictureData && pictureData.startsWith('data:image') ? '是' : '否'}</p>
                    `;
                    container.appendChild(div);
                } catch (error) {
                    console.error('測試失敗:', idiom, error);
                    const div = document.createElement('div');
                    div.style.cssText = 'margin: 20px; padding: 20px; border: 1px solid red;';
                    div.innerHTML = `<h3>${idiom} - 錯誤</h3><p>${error.message}</p>`;
                    container.appendChild(div);
                }
            }
        }
        
        testPictureGeneration();
    </script>
</body>
</html>
