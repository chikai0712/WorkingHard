//
// BIND 9 DNS Server Configuration
// Multi-NS Project
//

options {
    // 監聽所有 IPv4 和 IPv6 地址
    listen-on port 53 { any; };
    listen-on-v6 port 53 { any; };
    
    // 允許查詢的網路
    allow-query { any; };
    
    // 允許遞迴查詢（可選，根據需求調整）
    recursion yes;
    
    // 允許從這些網路遞迴查詢
    allow-recursion { any; };
    
    // DNS 轉發器（可選，如果不想使用根服務器）
    // forwarders {
    //     8.8.8.8;
    //     1.1.1.1;
    // };
    
    // 數據目錄
    directory "/var/cache/bind";
    
    // 轉儲文件
    dump-file "/var/cache/bind/cache_dump.db";
    statistics-file "/var/cache/bind/named_stats.txt";
    memstatistics-file "/var/cache/bind/named_mem_stats.txt";
    
    // 日誌設置
    version "Not Disclosed";
    hostname none;
    server-id none;
    
    // 安全設置
    auth-nxdomain no;    # conform to RFC1035
    
    // Zone 文件目錄
    zone-statistics yes;
};

// 日誌配置
logging {
    channel default_log {
        file "/var/log/bind/named.log" versions 3 size 5m;
        severity dynamic;
        print-time yes;
        print-severity yes;
        print-category yes;
    };
    
    channel query_log {
        file "/var/log/bind/query.log" versions 3 size 5m;
        severity dynamic;
        print-time yes;
    };
    
    category default { default_log; };
    category queries { query_log; };
};

// Root hints（根服務器）
zone "." IN {
    type hint;
    file "/etc/bind/db.root";
};

// Localhost zones
zone "localhost" {
    type master;
    file "/etc/bind/db.local";
};

zone "127.in-addr.arpa" {
    type master;
    file "/etc/bind/db.127";
};

zone "0.in-addr.arpa" {
    type master;
    file "/etc/bind/db.0";
};

zone "255.in-addr.arpa" {
    type master;
    file "/etc/bind/db.255";
};

// IPv6 localhost
zone "ip6.arpa" {
    type master;
    file "/etc/bind/db.ip6.arpa";
};

// 包含自定義 Zone 配置
include "/etc/bind/named.conf.local";

// 包含 rndc 配置（可選）
// include "/etc/bind/rndc.key";  // 如果不需要 rndc 控制，可以註釋掉

