# Kubernetes 審計策略
# 記錄所有生產環境操作，無法刪除或修改

apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # 記錄所有請求
  - level: Metadata
  
  # 記錄所有寫入操作（詳細）
  - level: RequestResponse
    verbs: ["create", "update", "patch", "delete"]
    resources:
      - group: "*"
        resources: ["*"]
  
  # 記錄所有 RBAC 相關操作
  - level: RequestResponse
    resources:
      - group: "rbac.authorization.k8s.io"
        resources: ["*"]
  
  # 記錄所有 Secrets 訪問（即使只讀）
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["secrets"]
  
  # 記錄所有 Pod 執行操作
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["pods/exec", "pods/attach", "pods/portforward"]
  
  # 記錄所有 ServiceAccount 操作
  - level: RequestResponse
    resources:
      - group: ""
        resources: ["serviceaccounts"]
  
  # 忽略只讀操作（減少日誌量）
  - level: None
    verbs: ["get", "list", "watch"]
    resources:
      - group: ""
        resources: ["endpoints", "services", "events"]
  
  # 忽略健康檢查
  - level: None
    users: ["system:kube-proxy"]
    verbs: ["watch"]
    resources:
      - group: ""
        resources: ["endpoints", "services"]

